name: Regression
on:
  workflow_call:
    inputs:
      git_ref:
        type: string
      base_hash:
        type: string
      build_current_release:
        default: false
        type: boolean
      run_slow_tests:
        default: false
        type: boolean
      runner_linux_x64:
        default: ubuntu-latest
        type: string
      runner_linux_small:
        default: ubuntu-latest
        type: string
      save_cache:
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to test for current release'
        type: string
      base_hash:
        description: 'Base hash'
        type: string
      build_current_release:
        description: 'Build and upload linux-release-build in this workflow'
        default: true
        type: boolean
      run_slow_tests:
        description: 'Run slow tests when applicable'
        default: false
        type: boolean
      runner_linux_x64:
        description: 'Optional x64 runner label override'
        default: ubuntu-latest
        type: string
      runner_linux_small:
        description: 'Optional small runner label override'
        default: ubuntu-latest
        type: string
      save_cache:
        default: false
        type: boolean
  repository_dispatch:

concurrency:
  group: regression-${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  GIT_REF: ${{ inputs.git_ref != '' && inputs.git_ref || github.sha }}
  BASE_BRANCH: ${{ github.base_ref || (endsWith(github.ref_name, '_feature') && 'feature' || 'main') }}
  BASE_HASH: ${{ inputs.base_hash }}

jobs:
  linux-base:
    name: Linux Base
    runs-on: ${{ inputs.runner_linux_x64 }}
    env:
      GEN: ninja

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.GIT_REF }}

      - name: Install tools
        run: python3 scripts/ci/retry.py -- make toolsci

      - uses: ./.github/actions/ccache-action

      - name: Build current release
        if: ${{ inputs.build_current_release }}
        uses: duckdb/duckdb-ci/build-duckdb@main
        env:
          BUILD_BENCHMARK: 1
          BUILD_JEMALLOC: 1
          CORE_EXTENSIONS: "icu;tpch;tpcds;fts;json;inet;parquet;autocomplete;httpfs"
          DISABLE_SANITIZER: 1
        with:
          build: python3 scripts/ci/retry.py -- make release
          bundle: make release-artifact
          upload-name: linux-release-build
          vcpkg-commit: 84bab45d415d22042bd0b9081aea57f362da3f35
          save-cache: ${{ inputs.save_cache }}

      - name: Select base ref
        run: |
          if [[ "${{ github.repository }}" == "duckdb/duckdb" && "${{ github.ref_name }}" == "main" ]]; then
            if [[ -z "${BASE_HASH}" ]]; then
              BASE_REF="$(bash scripts/ci/last_main_success_commit.sh)"
            else
              BASE_REF="${BASE_HASH}"
            fi
          else
            git fetch https://github.com/duckdb/duckdb.git "${BASE_BRANCH}:refs/remotes/duckdb/${BASE_BRANCH}"
            if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "merge_group" ]]; then
              BASE_REF="$(git merge-base "${GIT_REF}" "duckdb/${BASE_BRANCH}")"
              if [[ -z "${BASE_REF}" ]]; then
                echo "Failed to compute merge base between ${GIT_REF} and duckdb/${BASE_BRANCH}"
                exit 1
              fi
            else
              BASE_REF="duckdb/${BASE_BRANCH}"
            fi
          fi
          echo "Selected base ref: ${BASE_REF}"
          echo "Current ref: ${GIT_REF}"
          echo "Base branch ref: duckdb/${BASE_BRANCH}"
          echo "BASE_REF=${BASE_REF}" >> "$GITHUB_ENV"

      - name: Reset workspace to base ref
        run: |
          make clean
          git checkout --detach "${BASE_REF}"
          git submodule update --init --recursive

      - name: Build base release
        uses: duckdb/duckdb-ci/build-duckdb@main
        env:
          BUILD_BENCHMARK: 1
          BUILD_JEMALLOC: 1
          CORE_EXTENSIONS: "icu;tpch;tpcds;fts;json;inet;parquet;autocomplete;httpfs"
          DISABLE_SANITIZER: 1
        with:
          build: python3 scripts/ci/retry.py -- make release
          bundle: make release-artifact
          upload-name: linux-base-build
          vcpkg-commit: 84bab45d415d22042bd0b9081aea57f362da3f35
          save-cache: ${{ inputs.save_cache }}

  regression-bench:
    name: Bench ${{ matrix.name }}
    needs:
      - linux-base
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ingestion Perf
            benchmarks: .github/regression/ingestion.csv
          - name: Micro + TPCH + TPCH-PARQUET + TPCDS
            benchmarks: .github/regression/micro.csv .github/regression/tpch.csv .github/regression/tpch_parquet.csv .github/regression/tpcds.csv
          - name: H2OAI + IMDB + CSV
            benchmarks: .github/regression/h2oai.csv .github/regression/imdb.csv .github/regression/csv.csv
          - name: RealNest
            benchmarks: .github/regression/realnest.csv
            data_setup: |
              mkdir -p duckdb_benchmark_data
              python3 scripts/ci/retry.py -- wget -q https://blobs.duckdb.org/data/realnest/realnest.duckdb --output-document=duckdb_benchmark_data/real_nest.duckdb

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.GIT_REF }}

      - name: Install
        run: |
          python3 scripts/ci/retry.py -- make toolsci

      - name: Download current release artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-release-build
          path: build/current

      - name: Extract current release artifact
        run: |
          rm -rf build/current/release
          tar -xzf build/current/release-artifact.tar.gz -C build/current

      - name: Download base artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-base-build
          path: build/base

      - name: Extract base artifact
        run: |
          rm -rf build/base/release
          tar -xzf build/base/release-artifact.tar.gz -C build/base

      - name: Prepare benchmark data
        if: ${{ matrix.data_setup }}
        run: ${{ matrix.data_setup }}

      - name: Run regression benchmarks
        run: |
          status=0

          for benchmark in ${{ matrix.benchmarks }}; do
            extra_args=(--clear-benchmark-cache)
            if [[ "$benchmark" == ".github/regression/realnest.csv" ]]; then
              extra_args=()
            fi

            echo "::group::$(basename "$benchmark" .csv)"
            if ! python scripts/regression/test_runner.py \
              --old build/base/release/benchmark/benchmark_runner \
              --new build/current/release/benchmark/benchmark_runner \
              --benchmarks "$benchmark" \
              --verbose \
              --threads 2 \
              "${extra_args[@]}"; then
              status=1
              echo "::error title=Regression suite failed::$(basename "$benchmark" .csv) in ${{ matrix.name }}"
            fi
            echo "::endgroup::"
          done

          exit $status

  regression-bench-fivetran:
    name: Bench Fivetran
    if: ${{ github.repository == 'duckdb/duckdb' && github.ref_name == 'main' }}
    needs:
      - linux-base
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.GIT_REF }}

      - name: Install
        run: |
          python3 scripts/ci/retry.py -- make toolsci

      - name: Checkout Private Regression
        if: ${{ github.repository == 'duckdb/duckdb' && github.ref_name == 'main' }}
        uses: actions/checkout@v6
        with:
          repository: duckdblabs/fivetran_regression
          ref: main
          token: ${{ secrets.DUCKDBLABS_BOT_TOKEN }}
          path: benchmark/fivetran

      - name: Download current release artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-release-build
          path: build/current

      - name: Extract current release artifact
        run: |
          rm -rf build/current/release
          tar -xzf build/current/release-artifact.tar.gz -C build/current

      - name: Download base artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-base-build
          path: build/base

      - name: Extract base artifact
        run: |
          rm -rf build/base/release
          tar -xzf build/base/release-artifact.tar.gz -C build/base

      - name: Run regression benchmark
        run: |
          python scripts/regression/test_runner.py --old build/base/release/benchmark/benchmark_runner --new build/current/release/benchmark/benchmark_runner --benchmarks benchmark/fivetran/benchmark_list.csv --verbose --threads 2 --clear-benchmark-cache

  regression-test-storage:
    name: Storage Size Regression Test
    needs:
      - linux-base
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.GIT_REF }}

      - name: Install
        run: |
          python3 scripts/ci/retry.py -- make toolsci

      - name: Download current release artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-release-build
          path: build/current

      - name: Extract current release artifact
        run: |
          rm -rf build/current/release
          tar -xzf build/current/release-artifact.tar.gz -C build/current

      - name: Download base artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-base-build
          path: build/base

      - name: Extract base artifact
        run: |
          rm -rf build/base/release
          tar -xzf build/base/release-artifact.tar.gz -C build/base

      - name: Regression Test
        run: |
          python scripts/regression_test_storage_size.py --old build/base/release/duckdb --new build/current/release/duckdb

      - name: Test for incompatibility
        run: |
          if (cmp test/sql/storage_version/storage_version.db build/base/release/test/sql/storage_version/storage_version.db); then
            echo "storage_changed=false" >> "$GITHUB_ENV"
          else
            echo "storage_changed=true" >> "$GITHUB_ENV"
          fi

      - name: Regression Compatibility Test (testing bidirectional compatibility)
        if: env.storage_changed == 'false'
        run: |
          # Regenerate test/sql/storage_version.db with newer version -> read with older version
          python3 scripts/generate_storage_version.py build/current/release/duckdb
          ./build/base/release/duckdb test/sql/storage_version/storage_version.db
          # Regenerate test/sql/storage_version.db with older version -> read with newer version (already performed as part of test.slow)
          python3 scripts/generate_storage_version.py build/base/release/duckdb
          ./build/current/release/duckdb test/sql/storage_version/storage_version.db

      - name: Regression Compatibility Test (testing storage version has been bumped)
        if: env.storage_changed == 'true'
        run: |
          python3 scripts/generate_storage_version.py build/current/release/duckdb
          mv test/sql/storage_version/storage_version.db current.db
          python3 scripts/generate_storage_version.py build/base/release/duckdb
          mv test/sql/storage_version/storage_version.db base.db
          if (cmp -i 8 -n 12 current.db base.db); then
            echo "Expected storage format to be bumped, but this is not the case"
            echo "This might fail spuriously if changes to content of test database / generation script happened"
            exit 1
          else
            echo "Storage bump detected, all good!"
          fi

  regression-test-binary-size:
    name: Regression test binary size
    needs:
      - linux-base
    runs-on: ${{ inputs.runner_linux_small }}
    env:
      EXTENSION_STATIC_BUILD: 1

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.GIT_REF }}

      - name: Install
        run: |
          python3 scripts/ci/retry.py -- make toolsci

      - name: Download current release artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-release-build
          path: build/current

      - name: Extract current release artifact
        run: |
          rm -rf build/current/release
          tar -xzf build/current/release-artifact.tar.gz -C build/current

      - name: Download base artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-base-build
          path: build/base

      - name: Extract base artifact
        run: |
          rm -rf build/base/release
          tar -xzf build/base/release-artifact.tar.gz -C build/base

      - name: Regression Test Extension binary size
        run: |
          python scripts/regression_test_extension_size.py --old build/base/release/repository --new build/current/release/repository --expect json,parquet,tpch,tpcds

  regression-test-plan-cost:
    name: Regression Test Join Order Plan Cost
    needs:
      - linux-base
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.GIT_REF }}

      - name: Install
        run: |
          python3 scripts/ci/retry.py -- make toolsci
          python3 scripts/ci/retry.py -- pip install tqdm

      - name: Download current release artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-release-build
          path: build/current

      - name: Extract current release artifact
        run: |
          rm -rf build/current/release
          tar -xzf build/current/release-artifact.tar.gz -C build/current

      - name: Download base artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-base-build
          path: build/base

      - name: Extract base artifact
        run: |
          rm -rf build/base/release
          tar -xzf build/base/release-artifact.tar.gz -C build/base

      - name: Regression Test IMDB
        if: always()
        run: |
          python scripts/plan_cost_runner.py --old build/base/release/duckdb --new build/current/release/duckdb --dir=benchmark/imdb_plan_cost

      - name: Regression Test TPCH
        if: always()
        run: |
          python scripts/plan_cost_runner.py --old build/base/release/duckdb --new build/current/release/duckdb --dir=benchmark/tpch_plan_cost
