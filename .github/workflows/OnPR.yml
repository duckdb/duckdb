name: OnPR
on:
  pull_request_target:
    types: [opened, reopened, synchronize]

concurrency:
  group: onpr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  apply:
    name: Apply PR actions
    runs-on: namespace-profile-linux-slim
    timeout-minutes: 10

    env:
      MOVE_PR_TO_DRAFT_TOKEN: ${{ secrets.MOVE_PR_TO_DRAFT_TOKEN }}

    # WARNING: This workflow runs with base-repository privileges.
    # Do not check out PR code, execute PR scripts, or read PR files as trusted input.
    # Keep this workflow metadata/API-only.

    steps:
      - name: Prepare
        id: prepare
        shell: bash
        env:
          EVENT_ACTION: ${{ github.event.action }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
        run: |
          add_member_label=false
          move_to_draft=false

          case "$AUTHOR_ASSOCIATION" in
            OWNER|MEMBER|COLLABORATOR)
              is_trusted_author=true
              ;;
            *)
              is_trusted_author=false
              ;;
          esac

          if [ "$EVENT_ACTION" = "opened" ] && [ "$is_trusted_author" = "true" ]; then
            add_member_label=true
          fi

          if [ "$PR_DRAFT" = "false" ] && [ "$is_trusted_author" = "false" ]; then
            move_to_draft=true
          fi

          echo "add_member_label=$add_member_label" >> "$GITHUB_OUTPUT"
          echo "move_to_draft=$move_to_draft" >> "$GITHUB_OUTPUT"

      - name: Move PR to draft
        if: ${{ steps.prepare.outputs.move_to_draft == 'true' && env.MOVE_PR_TO_DRAFT_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ env.MOVE_PR_TO_DRAFT_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            await github.graphql(`
              mutation($id: ID!) {
                convertPullRequestToDraft(input: { pullRequestId: $id }) {
                  pullRequest {
                    id
                    number
                    isDraft
                  }
                }
              }
            `, {id: pr.node_id});
            core.info(`Converted PR #${pr.number} to draft`);

      - name: Add Member label
        if: ${{ steps.prepare.outputs.add_member_label == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['Member']
            });
            core.info(`Added Member label to PR #${pr.number}`);
