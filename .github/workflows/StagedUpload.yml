name: Staged Upload
on:
  workflow_call:
    inputs:
      target_git_describe:
        type: string
  workflow_dispatch:
    inputs:
      target_git_describe:
        type: string

jobs:
 staged-upload:
   runs-on: ubuntu-latest
   if: ${{ inputs.target_git_describe != '' }}
   steps:
     - uses: actions/checkout@v6
       with:
         fetch-depth: 0

     - uses: actions/setup-python@v6
       with:
         python-version: '3.12'

     - name: Install
       shell: bash
       run: python3 scripts/ci/retry.py -- bash -lc 'curl https://rclone.org/install.sh | sudo bash'

     - name: Download from staging bucket
       shell: bash
       env:
         AWS_ENDPOINT_URL: ${{ secrets.S3_DUCKDB_STAGING_ENDPOINT }}
         AWS_ACCESS_KEY_ID: ${{ secrets.S3_DUCKDB_STAGING_ID }}
         AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_DUCKDB_STAGING_KEY }}
       run: |
          TARGET=$(git log -1 --format=%h)
          mkdir to_be_uploaded
          rclone copy \
            ":s3,provider=AWS,env_auth=true,endpoint=${AWS_ENDPOINT_URL}:duckdb-staging/$TARGET/${{ inputs.target_git_describe }}/$GITHUB_REPOSITORY/github_release/" \
            to_be_uploaded/

     - name: Deploy
       if: ${{ inputs.target_git_describe != '' }}
       shell: bash
       env:
         AWS_ENDPOINT_URL: ${{ secrets.DUCKDB_INSTALL_S3_ENDPOINT }}
         AWS_ACCESS_KEY_ID: ${{ secrets.DUCKDB_INSTALL_S3_ID }}
         AWS_SECRET_ACCESS_KEY: ${{ secrets.DUCKDB_INSTALL_S3_SECRET }}
         GH_TOKEN: ${{ secrets.GH_TOKEN }}
       run: |
         python3 scripts/asset-upload-gha.py to_be_uploaded/*
         rclone copy \
           --header-upload "Content-Type: application/octet-stream" \
           to_be_uploaded/ \
           ":s3,provider=AWS,env_auth=true,endpoint=${AWS_ENDPOINT_URL}:duckdb-install/${{ inputs.target_git_describe }}/"
