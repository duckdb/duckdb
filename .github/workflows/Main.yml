name: Main
on:
  workflow_dispatch:
  repository_dispatch:
  push:
    branches-ignore:
      - 'main'
      - 'feature'
      - 'v*.*-*'
    paths-ignore:
      - '**.md'
      - 'tools/**'
      - '!tools/shell/**'
      - '!tools/juliapkg/**'
      - '.github/patches/duckdb-wasm/**'
      - '.github/workflows/**'
      - '!.github/workflows/Main.yml'
      - '!.github/workflows/Swift.yml'
      - '!.github/workflows/Windows.yml'
      - '!.github/workflows/Regression.yml'
      - '!.github/workflows/Extensions.yml'
  merge_group:
  pull_request:
    types: [opened, reopened, ready_for_review, converted_to_draft, synchronize]
    paths-ignore:
      - '**.md'
      - 'tools/**'
      - '!tools/shell/**'
      - '!tools/juliapkg/**'
      - '.github/patches/duckdb-wasm/**'
      - '.github/workflows/**'
      - '!.github/workflows/Main.yml'
      - '!.github/workflows/Swift.yml'
      - '!.github/workflows/Windows.yml'
      - '!.github/workflows/Regression.yml'
      - '!.github/workflows/Extensions.yml'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
 prepare:
    # We run all other jobs on PRs only if they are not draft PR
    if: |
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (github.event.action != 'synchronize' || github.event.pull_request.user.login == 'smvv')
    runs-on: ${{ github.repository == 'duckdb/duckdb' && 'namespace-profile-linux-small' || 'ubuntu-latest' }}
    outputs:
      runner_linux_small: ${{ steps.select_runner.outputs.runner_linux_small }}
      runner_linux_x64: ${{ steps.select_runner.outputs.runner_linux_x64 }}
      runner_linux_22_x64: ${{ steps.select_runner.outputs.runner_linux_22_x64 }}
      runner_linux_arm64: ${{ steps.select_runner.outputs.runner_linux_arm64 }}
      runner_windows_2022_x64: ${{ steps.select_runner.outputs.runner_windows_2022_x64 }}
      runner_macos_arm64: ${{ steps.select_runner.outputs.runner_macos_arm64 }}
      runner_macos_14_arm64: ${{ steps.select_runner.outputs.runner_macos_14_arm64 }}
      runners: ${{ steps.build_runners.outputs.runners }}
      linux_cli_matrix: ${{ steps.build_linux_cli_matrices.outputs.linux_cli_matrix }}
      linux_musl_cli_matrix: ${{ steps.build_linux_cli_matrices.outputs.linux_musl_cli_matrix }}
      extensions_changed: ${{ steps.changed.outputs.extensions_any_changed }}
      extensions_extra_exclude_archs: ${{ steps.extensions.outputs.extra_exclude_archs }}
    env:
      CC: gcc-10
      CXX: g++-10
      GEN: ninja
      # Avoid downloading blobs >50 KB until they are actually needed by git.
      GIT_FETCH_FILTER: blob:limit=50k
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: checkout.workers
      GIT_CONFIG_VALUE_0: 4
    steps:
      - uses: actions/checkout@v6
        with:
          filter: ${{ env.GIT_FETCH_FILTER }}

      - name: Fetch PR base branch history
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          # changed-files needs base branch history for merge-base lookup
          # and the exact base SHA for comparison.
          git fetch --no-tags --depth=100 --filter="${GIT_FETCH_FILTER}" origin \
            +refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }} \
            ${{ github.event.pull_request.base.sha }}

      - name: Detect changes
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          base_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          skip_initial_fetch: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          files_yaml: |
            extensions:
              - .github/config/**
              - .github/patches/**
              - extensions/**

      - name: Configure extensions
        id: extensions
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" || "${{ steps.changed.outputs.extensions_any_changed }}" == "true" ]]; then
            echo "extra_exclude_archs=" >> "$GITHUB_OUTPUT"
          else
            echo "extra_exclude_archs=windows_amd64;wasm_eh" >> "$GITHUB_OUTPUT"
          fi

      - name: Select CI runner
        id: select_runner
        run: |
          # Fall back to GitHub-native runners for forks.
          if [[ "${{ github.repository }}" == "duckdb/duckdb" ]]; then
            {
              echo "runner_linux_small=namespace-profile-linux-small"
              echo "runner_linux_x64=namespace-profile-linux-x64"
              echo "runner_linux_22_x64=namespace-profile-linux-22-x64"
              echo "runner_linux_arm64=namespace-profile-linux-arm64"
              echo "runner_windows_2022_x64=namespace-profile-windows-x64"
              echo "runner_macos_arm64=namespace-profile-macos-arm64"
              echo "runner_macos_14_arm64=namespace-profile-macos-14-arm64"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "runner_linux_small=ubuntu-latest"
              echo "runner_linux_x64=ubuntu-latest"
              echo "runner_linux_22_x64=ubuntu-22.04"
              echo "runner_linux_arm64=ubuntu-24.04-arm"
              echo "runner_windows_2022_x64=windows-2022"
              echo "runner_macos_arm64=macos-14"
              echo "runner_macos_14_arm64=macos-14"
            } >> "$GITHUB_OUTPUT"
          fi

          grep runner_ "$GITHUB_OUTPUT"

      - name: Build runners JSON
        id: build_runners
        run: |
          echo "runners<<EOF" >> "$GITHUB_OUTPUT"
          cat <<EOF >> "$GITHUB_OUTPUT"
          {
            "linux_x64": "${{ steps.select_runner.outputs.runner_linux_x64 }}",
            "linux_22_x64": "${{ steps.select_runner.outputs.runner_linux_22_x64 }}",
            "linux_arm64": "${{ steps.select_runner.outputs.runner_linux_arm64 }}",
            "windows_2022_x64": "${{ steps.select_runner.outputs.runner_windows_2022_x64 }}",
            "windows_x64": "${{ steps.select_runner.outputs.runner_windows_2022_x64 }}",
            "macos_arm64": "${{ steps.select_runner.outputs.runner_macos_arm64 }}",
            "macos_14_arm64": "${{ steps.select_runner.outputs.runner_macos_14_arm64 }}"
          }
          EOF
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build Linux CLI matrices
        id: build_linux_cli_matrices
        run: |
          linux_cli_matrix=$(
            jq -nc --arg runner "${{ steps.select_runner.outputs.runner_linux_x64 }}" \
              '[{runner: $runner, arch: "amd64", image: "x86_64"}]'
          )

          linux_musl_cli_matrix=$(
            jq -nc --arg runner "${{ steps.select_runner.outputs.runner_linux_arm64 }}" \
              '[{runner: $runner, arch: "arm64"}]'
          )

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            linux_cli_matrix=$(
              jq -c --arg runner "${{ steps.select_runner.outputs.runner_linux_arm64 }}" \
                '. += [{runner: $runner, arch: "arm64", image: "aarch64"}]' <<<"$linux_cli_matrix"
            )

            linux_musl_cli_matrix=$(
              jq -c --arg runner "${{ steps.select_runner.outputs.runner_linux_x64 }}" \
                '. |= [{runner: $runner, arch: "amd64"}] + .' <<<"$linux_musl_cli_matrix"
            )
          fi

          echo "linux_cli_matrix=$linux_cli_matrix" >> "$GITHUB_OUTPUT"
          echo "linux_musl_cli_matrix=$linux_musl_cli_matrix" >> "$GITHUB_OUTPUT"

      - name: Install tools
        run: make format_tools

      - name: List Installed Packages
        run: pip3 freeze

      - name: Check format
        run: |
          clang-format --version
          clang-format --dump-config
          black --version
          make format-check-silent

      - name: Check generated files
        run: |
          make generate-files
          git diff --exit-code

      - name: Test CI scripts
        run: make test_ci

 linux-debug:
    name: Linux Debug
    # This tests release build while enabling slow verifiers (masked by #ifdef DEBUG) and sanitizers
    needs: prepare
    runs-on: ${{ needs.prepare.outputs.runner_linux_x64 }}
    env:
      CC: gcc
      CXX: g++
      TREAT_WARNINGS_AS_ERRORS: 1
      GEN: ninja
      CRASH_ON_ASSERT: 1
      FORCE_DEBUG: 1
      FORCE_ASSERT: 1
      REDUCE_SYMBOLS: 1
      EXTENSIONS_STATIC_BUILD: 0

    steps:
    - uses: actions/checkout@v6

    - id: describe_step
      run: echo "git_describe=$(git describe --tags --long)" >> "$GITHUB_OUTPUT"

    - name: Install tools
      run: python3 scripts/ci/retry.py -- make toolsci

    - uses: ./.github/actions/ccache-action

    - name: Build
      run: python3 scripts/ci/retry.py -- make relassert

    - name: Smoke tests
      run: make smoke

    - name: Output version info
      run: ./build/relassert/duckdb -c "PRAGMA version;"

    - name: Prepare relassert artifact
      run: make relassert-artifact

    - name: Upload relassert build artifact
      uses: actions/upload-artifact@v7
      with:
        name: linux-debug-relassert-build
        path: build/relassert-artifact.tar.gz
        if-no-files-found: error

 linux-debug-tests:
    name: Linux Debug Tests
    needs:
      - prepare
      - linux-debug
    runs-on: ${{ needs.prepare.outputs.runner_linux_x64 }}

    steps:
    - uses: actions/checkout@v6
    - name: Install tools
      run: python3 scripts/ci/retry.py -- make toolsci

    - name: Download relassert build artifact
      uses: actions/download-artifact@v5
      with:
        name: linux-debug-relassert-build
        path: build

    - name: Extract relassert build artifact
      run: |
        rm -rf build/relassert
        tar -xzf build/relassert-artifact.tar.gz -C build
        ls -lh build/relassert/test/unittest

    - name: Set DUCKDB_INSTALL_LIB for ADBC tests
      run: echo "DUCKDB_INSTALL_LIB=$(find `pwd` -name "libduck*.so" | head -n 1)" >> $GITHUB_ENV

    - name: Test DUCKDB_INSTALL_LIB variable
      run: echo $DUCKDB_INSTALL_LIB

    - name: Test
      run: make unittest_relassert

 regression:
    uses: ./.github/workflows/Regression.yml
    secrets: inherit
    needs:
      - prepare
      - linux-debug
      - linux-release
    with:
      build_current_release: 'false'
      runner_linux_x64: ${{ needs.prepare.outputs.runner_linux_x64 }}
      runner_linux_small: ${{ needs.prepare.outputs.runner_linux_small }}

 code-quality:
    uses: ./.github/workflows/CodeQuality.yml
    secrets: inherit
    needs: prepare

 extensions:
    uses: ./.github/workflows/Extensions.yml
    secrets: inherit
    needs:
      - prepare
      - linux-debug
    with:
      git_ref: ${{ github.sha }}
      extra_exclude_archs: ${{ needs.prepare.outputs.extensions_extra_exclude_archs }}
      skip_tests: 'false'
      run_all: 'true'
      runners: ${{ needs.prepare.outputs.runners }}

 wasm-eh:
    name: Wasm EH
    needs:
      - prepare
      - linux-debug
    runs-on: ${{ needs.prepare.outputs.runner_linux_x64 }}

    steps:
    - uses: actions/checkout@v6

    - uses: mymindstorm/setup-emsdk@v13
      with:
        version: latest

    - name: Install tools
      run: python3 scripts/ci/retry.py -- make toolsci

    - name: Build
      run: make wasm_ci

 linux-release:
    name: Linux Release
    needs: prepare
    runs-on: ${{ needs.prepare.outputs.runner_linux_x64 }}
    env:
      GEN: ninja

    steps:
    - uses: actions/checkout@v6

    - name: Install tools
      run: python3 scripts/ci/retry.py -- make toolsci

    - uses: ./.github/actions/ccache-action

    - uses: ./.github/actions/linux_release_build
      with:
        artifact_name: linux-release-build

    - name: Build linux default release
      run: make clean release

    - name: Prepare linux default release artifact
      run: |
        make release-artifact
        mv build/release-artifact.tar.gz build/linux-default-release.tar.gz

    - name: Upload linux default release artifact
      uses: actions/upload-artifact@v7
      with:
        name: linux-default-release-build
        path: build/linux-default-release.tar.gz
        if-no-files-found: error

 linux-release-tests:
    name: Linux Release Tests
    needs:
      - prepare
      - linux-release
    runs-on: ${{ needs.prepare.outputs.runner_linux_x64 }}

    steps:
    - uses: actions/checkout@v6
    - name: Install tools
      run: python3 scripts/ci/retry.py -- make toolsci

    - name: Download release build artifact
      uses: actions/download-artifact@v5
      with:
        name: linux-release-build
        path: build

    - name: Extract release build artifact
      shell: bash
      run: |
        rm -rf build/release
        tar -xzf build/release-artifact.tar.gz -C build

    - name: Test
      run: make allunit

 symbol-leakage:
    name: Symbol Leakage
    runs-on: ubuntu-24.04
    needs:
      - prepare
      - linux-release

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Download linux default release artifact
      uses: actions/download-artifact@v5
      with:
        name: linux-default-release-build
        path: build

    - name: Extract linux default release artifact
      run: |
        rm -rf build/release
        tar -xzf build/linux-default-release.tar.gz -C build

    - name: Symbol Leakage Test
      run: python3 scripts/exported_symbols_check.py build/release/src/libduckdb*.so

    - name: Banned Symbol Check
      run: python3 scripts/banned_symbols_check.py --directory build/release/src

 linux-release-cli:
    name: Linux CLI (${{ matrix.config.arch }})
    needs:
      - prepare
      - linux-release-tests
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.prepare.outputs.linux_cli_matrix) }}
    runs-on: ${{ matrix.config.runner }}

    steps:
    - uses: actions/checkout@v6

    - name: Install tools
      run: python3 scripts/ci/retry.py -- make toolsci

    - uses: ./.github/actions/cleanup_runner

    - name: Install pytest
      run: |
        python3 -m pip install --break-system-packages pytest

    - uses: ./.github/actions/ccache-action

    - name: Build
      run: |
        export PWD=`pwd`
        docker run                                                             \
        -v$PWD:$PWD                                                            \
        -e GEN=ninja                                                           \
        -e CC='ccache gcc'                                                     \
        -e CXX='ccache g++'                                                    \
        -e CCACHE_DIR=$PWD/.ccache                                             \
        -e EXTENSION_CONFIGS="$PWD/.github/config/bundled_extensions.cmake"    \
        -e ENABLE_EXTENSION_AUTOLOADING=1                                      \
        -e ENABLE_EXTENSION_AUTOINSTALL=1                                      \
        -e BUILD_BENCHMARK=1                                                   \
        -e FORCE_WARN_UNUSED=1                                                 \
        quay.io/pypa/manylinux_2_28_${{ matrix.config.image }}                 \
        bash -c "
          set -e
          cat /etc/os-release
          dnf install -y \
            ccache       \
            ninja-build  \
            perl-IPC-Cmd
          git config --global --add safe.directory $PWD
          make -C $PWD
        "

    - name: Print platform
      run: ./build/release/duckdb -c "PRAGMA platform;"

    - name: Deploy
      env:
        AWS_ENDPOINT_URL: ${{ secrets.S3_DUCKDB_STAGING_ENDPOINT }}
        AWS_ACCESS_KEY_ID: ${{ secrets.S3_DUCKDB_STAGING_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_DUCKDB_STAGING_KEY }}
      run: |
        python3 scripts/amalgamation.py
        zip -j duckdb_cli-linux-${{ matrix.config.arch }}.zip build/release/duckdb
        gzip -9 -k -n -c build/release/duckdb > duckdb_cli-linux-${{ matrix.config.arch }}.gz
        zip -j libduckdb-linux-${{ matrix.config.arch }}.zip build/release/src/libduckdb*.* src/amalgamation/duckdb.hpp src/include/duckdb.h
        ./scripts/upload-assets-to-staging.sh github_release libduckdb-linux-${{ matrix.config.arch }}.zip duckdb_cli-linux-${{ matrix.config.arch }}.zip duckdb_cli-linux-${{ matrix.config.arch }}.gz

    - uses: actions/upload-artifact@v7
      with:
        name: duckdb-binaries-linux-${{ matrix.config.arch }}
        path: |
          libduckdb-linux-${{ matrix.config.arch }}.zip
          duckdb_cli-linux-${{ matrix.config.arch }}.zip
          duckdb_cli-linux-${{ matrix.config.arch }}.gz

    - name: Test
      run: make allunit

    - name: Release specific tests
      run: make unittest_release_tag

    - name: Tools Tests
      run: python3 -m pytest tools/shell/tests --shell-binary build/release/duckdb

    - name: Examples
      run: |
        build/release/benchmark/benchmark_runner benchmark/micro/update/update_with_join.benchmark
        build/release/duckdb -c "COPY (SELECT 42) TO '/dev/stdout' (FORMAT PARQUET)" | cat

 linux-musl-release-cli:
    name: Linux CLI (${{ matrix.config.arch }}-musl)
    needs:
      - prepare
      - linux-release-tests
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJson(needs.prepare.outputs.linux_musl_cli_matrix) }}
    runs-on: ${{ matrix.config.runner }}

    steps:
    - uses: actions/checkout@v6

    - name: Install tools
      run: python3 scripts/ci/retry.py -- make toolsci

    - uses: ./.github/actions/cleanup_runner

    - uses: ./.github/actions/ccache-action

    - name: Build
      shell: bash
      run: |
        export PWD=`pwd`
        docker run                                                          \
        -v$PWD:$PWD                                                         \
        -e GEN=ninja                                                        \
        -e CC='ccache gcc'                                                  \
        -e CXX='ccache g++'                                                 \
        -e CCACHE_DIR=$PWD/.ccache                                          \
        -e EXTENSION_CONFIGS="$PWD/.github/config/bundled_extensions.cmake" \
        -e ENABLE_EXTENSION_AUTOLOADING=1                                   \
        -e ENABLE_EXTENSION_AUTOINSTALL=1                                   \
        -e BUILD_BENCHMARK=1                                                \
        -e FORCE_WARN_UNUSED=1                                              \
        alpine:3.22                                                         \
        sh -c "
          set -e
          cat /etc/os-release
          apk add   \
            ccache  \
            cmake   \
            g++     \
            git     \
            make    \
            samurai
          git config --global --add safe.directory $PWD
          make -C $PWD
        "

    - name: Deploy
      shell: bash
      env:
        AWS_ENDPOINT_URL: ${{ secrets.S3_DUCKDB_STAGING_ENDPOINT }}
        AWS_ACCESS_KEY_ID: ${{ secrets.S3_DUCKDB_STAGING_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_DUCKDB_STAGING_KEY }}
      run: |
        python3 scripts/amalgamation.py
        zip -j duckdb_cli-linux-${{ matrix.config.arch }}-musl.zip build/release/duckdb
        gzip -9 -k -n -c build/release/duckdb > duckdb_cli-linux-${{ matrix.config.arch }}-musl.gz
        zip -j libduckdb-linux-${{ matrix.config.arch }}-musl.zip build/release/src/libduckdb*.* src/amalgamation/duckdb.hpp src/include/duckdb.h
        ./scripts/upload-assets-to-staging.sh github_release libduckdb-linux-${{ matrix.config.arch }}-musl.zip duckdb_cli-linux-${{ matrix.config.arch }}-musl.zip duckdb_cli-linux-${{ matrix.config.arch }}-musl.gz

    - uses: actions/upload-artifact@v7
      with:
        name: duckdb-binaries-linux-${{ matrix.config.arch }}-musl
        path: |
          libduckdb-linux-${{ matrix.config.arch }}-musl.zip
          duckdb_cli-linux-${{ matrix.config.arch }}-musl.zip
          duckdb_cli-linux-${{ matrix.config.arch }}-musl.gz

    - name: Test
      shell: bash
      run: |
        export PWD=`pwd`
        docker run   \
        -v$PWD:$PWD  \
        -e CI=1      \
        alpine:3.22                                                         \
        sh -c "
          set -e
          cat /etc/os-release
          apk add      \
            make       \
            python3    \
            py3-pytest
          cd $PWD
          echo Tests
          make allunit
          echo Release specific tests
          make unittest_release_tag
          echo Tools Tests
          python3 -m pytest tools/shell/tests --shell-binary build/release/duckdb
          echo Examples
          build/release/benchmark/benchmark_runner benchmark/micro/update/update_with_join.benchmark
          build/release/duckdb -c \"COPY (SELECT 42) TO '/dev/stdout' (FORMAT PARQUET)\" | cat
        "

 main_julia:
    name: Julia ${{ matrix.version }}
    if: ${{ github.ref_name == 'main' }}
    needs: linux-release-cli
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1'
        arch:
          - x64

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.sha }}

    - uses: julia-actions/setup-julia@v2
      with:
        version: ${{ matrix.version }}
        arch: ${{ matrix.arch }}

    - uses: actions/download-artifact@v5
      with:
        name: duckdb-binaries-linux-amd64
        path: linux-release-artifacts

    - name: Extract DuckDB Linux release artifacts
      shell: bash
      run: |
        mkdir -p build/release/src
        unzip -j linux-release-artifacts/duckdb_cli-linux-amd64.zip "duckdb" -d build/release
        chmod +x build/release/duckdb
        unzip -j linux-release-artifacts/libduckdb-linux-amd64.zip "libduckdb.so*" -d build/release/src
        ls -lah build/release/duckdb
        ls -lah build/release/src/libduckdb.so*

    - name: Run Tests
      shell: bash
      run: |
        JULIA_DUCKDB_LIBRARY="$(pwd)/build/release/src/libduckdb.so"
        export JULIA_DUCKDB_LIBRARY
        export JULIA_NUM_THREADS=2
        export LD_PRELOAD="/usr/lib/x86_64-linux-gnu/libstdc++.so.6"
        ls "$JULIA_DUCKDB_LIBRARY"
        cd tools/juliapkg
        julia --project -e "import Pkg; Pkg.test()"

    - name: Format Check
      if: ${{ always() && matrix.version == '1.10' }}
      shell: bash
      run: |
        cd tools/juliapkg
        julia -e "import Pkg; Pkg.add(\"JuliaFormatter\")"
        ./format_check.sh

 upload-libduckdb-src:
    name: Upload libduckdb-src.zip
    needs: linux-release-cli
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ github.sha }}

    - name: Deploy
      shell: bash
      env:
        AWS_ENDPOINT_URL: ${{ secrets.S3_DUCKDB_STAGING_ENDPOINT }}
        AWS_ACCESS_KEY_ID: ${{ secrets.S3_DUCKDB_STAGING_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_DUCKDB_STAGING_KEY }}
      run: |
        python3 scripts/amalgamation.py
        zip -j libduckdb-src.zip src/amalgamation/duckdb.hpp src/amalgamation/duckdb.cpp src/include/duckdb.h src/include/duckdb_extension.h
        ./scripts/upload-assets-to-staging.sh github_release libduckdb-src.zip

 swift:
    uses: ./.github/workflows/Swift.yml
    secrets: inherit
    needs:
      - prepare
      - linux-debug
    with:
      runner_macos_arm64: ${{ needs.prepare.outputs.runner_macos_14_arm64 }}

 windows:
    uses: ./.github/workflows/Windows.yml
    secrets: inherit
    needs:
      - prepare
      - linux-debug
    with:
      git_ref: ${{ github.sha }}
      runner_windows_2022_x64: ${{ needs.prepare.outputs.runner_windows_2022_x64 }}
      skip_tests: 'false'
      run_all: 'true'

 no-string-inline:
    name: No String Inline / Destroy Unpinned Blocks
    runs-on: ${{ needs.prepare.outputs.runner_linux_x64 }}
    needs:
      - prepare
      - linux-debug
    env:
      GEN: ninja
      CORE_EXTENSIONS: "icu;parquet;tpch;tpcds;fts;json;inet"
      DISABLE_STRING_INLINE: 1
      DESTROY_UNPINNED_BLOCKS: 1
      ALTERNATIVE_VERIFY: 1
      DISABLE_POINTER_SALT: 1
      DISABLE_GCC_FUNCTION_SECTIONS: 1
      LSAN_OPTIONS: suppressions=${{ github.workspace }}/.sanitizer-leak-suppressions.txt
      DUCKDB_TEST_DESCRIPTION: 'Compiled with ALTERNATIVE_VERIFY=1 DISABLE_STRING_INLINE=1 DESTROY_UNPINNED_BLOCKS=1 DISABLE_POINTER_SALT=1. Use require no_alternative_verify to skip.'

    steps:
      - uses: actions/checkout@v6

      - name: Install
        run: python3 scripts/ci/retry.py -- make toolsci

      - uses: ./.github/actions/ccache-action

      - name: Build
        run: python3 scripts/ci/retry.py -- make relassert

      - name: Test
        run: make unittest_relassert

 vector-sizes:
    name: Vector Sizes
    runs-on: ${{ needs.prepare.outputs.runner_linux_22_x64 }}
    needs:
      - prepare
      - linux-debug
    env:
      CC: gcc-10
      CXX: g++-10
      GEN: ninja
      DUCKDB_TEST_DESCRIPTION: 'Compiled with STANDARD_VECTOR_SIZE=2. Use require vector_size 2048 to skip tests.'

    steps:
      - uses: actions/checkout@v6

      - name: Install
        run: python3 scripts/ci/retry.py -- make toolsci

      - uses: ./.github/actions/ccache-action

      - name: Build
        run: STANDARD_VECTOR_SIZE=2 make reldebug

      - name: Test
        run: make unittest_reldebug

 valgrind:
    name: Valgrind
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-24.04
    needs: linux-debug
    env:
      CC: clang
      CXX: clang++
      DISABLE_SANITIZER: 1
      BUILD_JEMALLOC: 1
      CORE_EXTENSIONS: 'icu;json;parquet;tpch'
      GEN: ninja

    steps:
    - uses: actions/checkout@v6

    - name: Install
      shell: bash
      run: |
        python3 scripts/ci/retry.py -- make toolsci
        python3 scripts/ci/retry.py -- sudo apt-get install -y -qq valgrind clang

    - uses: ./.github/actions/ccache-action

    - name: Build
      shell: bash
      run: python3 scripts/ci/retry.py -- make relassert

    - name: Output version info
      shell: bash
      run: ./build/relassert/duckdb -c "PRAGMA version;"

    - name: Test
      shell: bash
      run: valgrind ./build/relassert/test/unittest test/sql/tpch/tpch_sf001.test_slow

 threadsan:
    name: Thread Sanitizer
    needs:
      - prepare
      - linux-debug
    runs-on: ${{ needs.prepare.outputs.runner_linux_x64 }}
    env:
      CC: clang
      CXX: clang++
      GEN: ninja
      BUILD_JEMALLOC: 1
      CORE_EXTENSIONS: "icu;tpch;tpcds;fts;json;inet"
      TSAN_OPTIONS: suppressions=${{ github.workspace }}/.sanitizer-thread-suppressions.txt
      DUCKDB_TEST_DESCRIPTION: 'Tests run with thread sanitizer.'

    steps:
    - uses: actions/checkout@v6

    - name: Install
      run: python3 scripts/ci/retry.py -- make toolsci

    - uses: ./.github/actions/ccache-action

    - name: Build
      run: THREADSAN=1 make reldebug

    - name: Test
      run: make unittest_threadsan

 amalgamation-tests:
    name: Amalgamation Tests
    runs-on: ${{ needs.prepare.outputs.runner_linux_small }}
    needs:
      - prepare
      - linux-debug
    env:
      CC: clang
      CXX: clang++

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Generate Amalgamation
      shell: bash
      run:  |
          python scripts/amalgamation.py --extended
          clang++ -std=c++17 -Isrc/amalgamation src/amalgamation/duckdb.cpp -emit-llvm -S -O0

 # TODO: Consider bringing back fts
 # TODO: DEBUG_STACKTRACE: 1 + reldebug ?
 linux-configs:
    name: Tests a release build with different configurations
    runs-on: ${{ needs.prepare.outputs.runner_linux_x64 }}
    needs:
      - prepare
      - linux-release

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install
      shell: bash
      run: python3 scripts/ci/retry.py -- make toolsci

    - name: Download linux release artifact
      uses: actions/download-artifact@v5
      with:
        name: linux-release-build
        path: build

    - name: Extract linux release artifact
      shell: bash
      run: |
        rm -rf build/release
        tar -xzf build/release-artifact.tar.gz -C build

    - name: test/configs/force_storage.json
      if: success() || failure()
      shell: bash
      run: |
        python3 scripts/ci/run_tests.py --test-config=test/configs/force_storage.json ./build/release/test/unittest

    - name: test/configs/force_storage_restart.json
      if: success() || failure()
      shell: bash
      run: |
        python3 scripts/ci/run_tests.py --test-config=test/configs/force_storage_restart.json ./build/release/test/unittest

    - name: test/configs/latest_storage.json
      if: success() || failure()
      shell: bash
      run: |
        python3 scripts/ci/run_tests.py --test-config=test/configs/latest_storage.json ./build/release/test/unittest

    - name: test/configs/block_verification.json
      if: success() || failure()
      shell: bash
      run: |
