name: NightlyTests
on:
  workflow_dispatch:
  repository_dispatch:
  push:
    branches-ignore:
      - 'main'
      - 'feature'
      - 'v*.*-*'
      - 'gh-readonly-queue/**'
    paths-ignore:
      - '**'
      - '!.github/workflows/NightlyTests.yml'
      - '!.github/patches/duckdb-wasm/**'
  pull_request:
    types: [opened, reopened, ready_for_review, converted_to_draft]
    paths-ignore:
      - '**'
      - '!.github/workflows/NightlyTests.yml'
      - '!.github/patches/duckdb-wasm/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  DUCKDB_WASM_VERSION: "cf2048bd6d669ffa05c56d7d453e09e99de8b87e"
  REDUCE_SYMBOLS: 1
  PYTHONUNBUFFERED: 1

jobs:
  check-draft:
    # We run all other jobs on PRs only if they are not draft PR
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    steps:
      - name: Preliminary checks on CI
        run: echo "Event name is ${{ github.event_name }}"

  linux-memory-leaks:
     name: Linux Memory Leaks
     needs: check-draft
     runs-on: ubuntu-24.04
     env:
       GEN: ninja

     steps:
     - uses: actions/checkout@v6
       with:
         fetch-depth: 0

     - uses: actions/setup-python@v6
       with:
         python-version: '3.12'

     - name: Install Ninja
       shell: bash
       run: python3 scripts/ci/retry.py -- make toolsci

     - uses: ./.github/actions/ccache-action

     - uses: ./.github/actions/cleanup_runner

     - uses: ./.github/actions/swap_space

     - name: Build
       shell: bash
       run: python3 scripts/ci/retry.py -- make

     - name: Test
       shell: bash
       run: |
         python3 test/memoryleak/test_memory_leaks.py

  release-assert:
    name: Release Assertions
    runs-on: ubuntu-latest
    needs: linux-memory-leaks
    env:
      GEN: ninja
      BUILD_JEMALLOC: 1
      CORE_EXTENSIONS: "icu;tpch;tpcds;fts;json;inet;httpfs"
      DISABLE_SANITIZER: 1
      CRASH_ON_ASSERT: 1
      RUN_SLOW_VERIFIERS: 1

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install
      shell: bash
      run: |
        python3 scripts/ci/retry.py -- make toolsci
        python3 scripts/ci/retry.py -- sudo apt-get install -y -qq libcurl4-openssl-dev

    - uses: ./.github/actions/ccache-action

    - uses: ./.github/actions/cleanup_runner

    - uses: ./.github/actions/swap_space

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11.5
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

    - name: Build
      shell: bash
      env:
        VCPKG_TOOLCHAIN_PATH: ${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
        USE_MERGED_VCPKG_MANIFEST: 1
      run: python3 scripts/ci/retry.py -- bash -lc 'UNSAFE_NUMERIC_CAST=1 make relassert'

    - name: Test
      shell: bash
      run: |
          python3 scripts/run_tests_one_by_one.py build/relassert/test/unittest "*" --test-config test/configs/release_assertions.json --no-exit --timeout 600 --time_execution

  release-assert-osx-storage:
    name: Release Assertions OSX Storage
    runs-on: macos-latest
    needs: linux-memory-leaks
    env:
      GEN: ninja
      CORE_EXTENSIONS: "icu;tpch;tpcds;fts;json;inet"
      DISABLE_SANITIZER: 1
      CRASH_ON_ASSERT: 1
      RUN_SLOW_VERIFIERS: 1

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Ninja
      run: python3 scripts/ci/retry.py -- brew install ninja

    - uses: ./.github/actions/ccache-action

    - uses: ./.github/actions/cleanup_runner

    - uses: ./.github/actions/swap_space

    - name: Build
      shell: bash
      run: python3 scripts/ci/retry.py -- bash -lc 'UNSAFE_NUMERIC_CAST=1 make relassert'

    - name: Test
      shell: bash
      run: |
          python3 scripts/run_tests_one_by_one.py build/relassert/test/unittest "*" --test-config test/configs/release_assertions.json --no-exit --timeout 600 --force-storage --time_execution

  smaller-binary:
    name: Smaller Binary
    runs-on: ubuntu-24.04
    needs: linux-memory-leaks
    env:
      GEN: ninja
      BUILD_JEMALLOC: 1
      CORE_EXTENSIONS: "icu;tpch;tpcds;json"
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: ./.github/actions/cleanup_runner

    - name: Install
      shell: bash
      run: python3 scripts/ci/retry.py -- make toolsci

    - uses: ./.github/actions/ccache-action

    - uses: ./.github/actions/cleanup_runner

    - uses: ./.github/actions/swap_space

    - name: Build
      shell: bash
      run: python3 scripts/ci/retry.py -- bash -lc 'SMALLER_BINARY=1 make'

    - name: Measure Size
      shell: bash
      run: ls -trlah build/release/src/libduckdb*

    - name: Test
      shell: bash
      run: |
          make allunit

  release-assert-clang:
    name: Release Assertions with Clang
    runs-on: ubuntu-latest
    needs: linux-memory-leaks
    env:
      CC: clang
      CXX: clang++
      GEN: ninja
      BUILD_JEMALLOC: 1
      CORE_EXTENSIONS: "icu;tpch;tpcds;fts;json;inet;httpfs"
      DISABLE_SANITIZER: 1
      CRASH_ON_ASSERT: 1
      RUN_SLOW_VERIFIERS: 1

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - uses: ./.github/actions/cleanup_runner

    - name: Install
      shell: bash
      run: |
        python3 scripts/ci/retry.py -- make toolsci
        python3 scripts/ci/retry.py -- sudo apt-get install -y -qq llvm libcurl4-openssl-dev

    - uses: ./.github/actions/ccache-action

    - uses: ./.github/actions/cleanup_runner

    - uses: ./.github/actions/swap_space

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11.5
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        vcpkgGitCommitId: 84bab45d415d22042bd0b9081aea57f362da3f35

    - name: Build
      shell: bash
      env:
        VCPKG_TOOLCHAIN_PATH: ${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
        USE_MERGED_VCPKG_MANIFEST: 1
      run: python3 scripts/ci/retry.py -- bash -lc 'UNSAFE_NUMERIC_CAST=1 make relassert'

    - name: Test
      shell: bash
      run: |
          python3 scripts/run_tests_one_by_one.py build/relassert/test/unittest "*" --test-config test/configs/release_assertions.json --no-exit --timeout 600 --time_execution

  sqllogic:
     name: Sqllogic tests
     runs-on: ubuntu-latest # Secondary task of this CI job is to test building duckdb on latest ubuntu
     needs: linux-memory-leaks

     steps:
     - uses: actions/checkout@v6
       with:
         fetch-depth: 0

     - uses: ./.github/actions/ccache-action

     - uses: ./.github/actions/cleanup_runner

     - uses: ./.github/actions/swap_space

     - name: Install tools
       shell: bash
       run: python3 scripts/ci/retry.py -- make toolsci

     # Build is implied by 'make sqlite' that will invoke implicitly 'make release' (we make it explicit)
     - name: Build
       shell: bash
       run: python3 scripts/ci/retry.py -- make release

     - name: Test
       shell: bash
       run: make sqlite

  storage-initialization:
     name: Storage Initialization Verification
     runs-on: ubuntu-22.04
     needs: linux-memory-leaks
     env:
       CC: gcc-10
       CXX: g++-10
       GEN: ninja

     steps:
     - uses: actions/checkout@v6
       with:
         fetch-depth: 0

     - uses: ./.github/actions/cleanup_runner

     - name: Install
       shell: bash
       run: python3 scripts/ci/retry.py -- make toolsci

     - uses: ./.github/actions/ccache-action

     - uses: ./.github/actions/cleanup_runner

     - uses: ./.github/actions/swap_space

     - name: Build
       shell: bash
       run: make debug

     - name: Test
       shell: bash
       run: python3 scripts/test_zero_initialize.py

  extension-updating:
    name: Extension updating test
    runs-on: ubuntu-22.04
    needs: linux-memory-leaks
    env:
      CC: gcc-10
      CXX: g++-10
      GEN: ninja

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout duckdb-httpfs
        uses: actions/checkout@v6
        with:
          repository: duckdb/duckdb-httpfs
          submodules: 'true'
          path: duckdb-httpfs

      - name: Install
        shell: bash
        run: python3 scripts/ci/retry.py -- make toolsci

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install
        shell: bash
        run: curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 https://rclone.org/install.sh | sudo bash

      - uses: ./.github/actions/ccache-action

      - uses: ./.github/actions/cleanup_runner

      - uses: ./.github/actions/swap_space

      - name: Build
        shell: bash
        run: python3 scripts/ci/retry.py -- bash -lc 'CORE_EXTENSIONS="tpch" make'

      - name: Start Minio
        working-directory: ${{ github.workspace }}/duckdb-httpfs
        shell: bash
        run: |
          export PATH="${{ github.workspace }}/build/release:$PATH"
          sudo ./scripts/install_s3_test_server.sh
          ./scripts/generate_presigned_url.sh
          source ./scripts/run_s3_test_server.sh
          source ./scripts/set_s3_test_server_variables.sh
          sleep 60

      - name: Run Extension Medata Tests
        shell: bash
        run: |
          ./scripts/run_extension_medata_tests.sh "${{ github.workspace }}/build/release/src/libduckdb_static.a"

  regression-test-memory-safety:
   name: Regression Tests between safe and unsafe builds
   runs-on: ubuntu-22.04
   needs: linux-memory-leaks
   env:
     CC: gcc-10
     CXX: g++-10
     GEN: ninja
     BUILD_BENCHMARK: 1
     BUILD_JEMALLOC: 1
     CORE_EXTENSIONS: "tpch;tpcds;httpfs"

   steps:
     - name: Checkout
       uses: actions/checkout@v6
       with:
         fetch-depth: 0

     - uses: ./.github/actions/cleanup_runner

     - name: Checkout tools repo
       uses: actions/checkout@v6
       with:
         fetch-depth: 0
         path: unsafe

     - uses: actions/setup-python@v6
       with:
         python-version: '3.12'

     - name: Install
       shell: bash
       run: |
        python3 scripts/ci/retry.py -- make toolsci
        python3 scripts/ci/retry.py -- sudo apt-get install -y -qq libcurl4-openssl-dev
        python3 scripts/ci/retry.py -- pip install requests

     - uses: ./.github/actions/ccache-action

     - uses: ./.github/actions/cleanup_runner

     - uses: ./.github/actions/swap_space

     - name: Build
       shell: bash
       run: |
         python3 scripts/ci/retry.py -- make

         cd unsafe
         python3 ../scripts/ci/retry.py -- bash -lc 'UNSAFE_NUMERIC_CAST=1 DISABLE_MEMORY_SAFETY=1 make'

     - name: Set up benchmarks
       shell: bash
       run: |
         cp -r benchmark unsafe/

     - name: Regression Test Micro
       if: always()
       shell: bash
       run: |
         python scripts/regression/test_runner.py --old unsafe/build/release/benchmark/benchmark_runner --new build/release/benchmark/benchmark_runner --benchmarks .github/regression/micro.csv --verbose --threads 2

     - name: Regression Test TPCH
       if: always()
       shell: bash
       run: |
         python scripts/regression/test_runner.py --old unsafe/build/release/benchmark/benchmark_runner --new build/release/benchmark/benchmark_runner --benchmarks .github/regression/tpch.csv --verbose --threads 2

     - name: Regression Test TPCDS
       if: always()
       shell: bash
       run: |
         python scripts/regression/test_runner.py --old unsafe/build/release/benchmark/benchmark_runner --new build/release/benchmark/benchmark_runner --benchmarks .github/regression/tpcds.csv --verbose --threads 2

     - name: Regression Test H2OAI
       if: always()
       shell: bash
       run: |
         python scripts/regression/test_runner.py --old unsafe/build/release/benchmark/benchmark_runner --new build/release/benchmark/benchmark_runner --benchmarks .github/regression/h2oai.csv --verbose --threads 2

     - name: Regression Test IMDB
       if: always()
       shell: bash
       run: |
         python scripts/regression/test_runner.py --old unsafe/build/release/benchmark/benchmark_runner --new build/release/benchmark/benchmark_runner --benchmarks .github/regression/imdb.csv --verbose --threads 2

  vector-and-block-sizes:
    name: Tests non-default vector and block size
    runs-on: ubuntu-24.04
    env:
      LSAN_OPTIONS: suppressions=${{ github.workspace }}/.sanitizer-leak-suppressions.txt
    needs: linux-memory-leaks

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install
        shell: bash
        run: python3 scripts/ci/retry.py -- make toolsci

      - uses: ./.github/actions/ccache-action

      - uses: ./.github/actions/cleanup_runner

      - uses: ./.github/actions/swap_space

      - name: Build
        id: build
        shell: bash
        env:
          CORE_EXTENSIONS: "json;parquet"
          GEN: ninja
          STANDARD_VECTOR_SIZE: 512
          DISABLE_SANITIZER: 1
        run: python3 scripts/ci/retry.py -- make relassert

      - name: All tests with 512 vector size and default block size
        shell: bash
        run: python3 scripts/ci/run_tests.py --test-config=test/configs/vector_size_512.json ./build/relassert/test/unittest "*"

      - name: All tests with 512 vector size and 16kB block size
        shell: bash
        run: python3 scripts/ci/run_tests.py --test-config=test/configs/block_size_16kB.json ./build/relassert/test/unittest "*"

  force-blocking-sink-source:
    name: Forcing async Sinks/Sources
    runs-on: ubuntu-24.04
    needs: check-draft
    env:
      GEN: ninja
      CORE_EXTENSIONS: "icu;parquet;tpch;tpcds;fts;json;inet"
      FORCE_ASYNC_SINK_SOURCE: 1

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install
        shell: bash
        run: python3 scripts/ci/retry.py -- make toolsci

      - uses: ./.github/actions/ccache-action

      - uses: ./.github/actions/cleanup_runner

      - uses: ./.github/actions/swap_space

      - name: Build
        shell: bash
        env:
          DISABLE_SANITIZER: 1
        run: python3 scripts/ci/retry.py -- make relassert

      - name: Test
        shell: bash
        run: python3 scripts/run_tests_one_by_one.py build/relassert/test/unittest --no-exit --timeout 600 --time_execution

  linux-wasm-experimental:
    name: WebAssembly duckdb-wasm builds
    # disable in NightlyTests
    if: ${{ vars.ENABLE_WASM_EXPERIMENTAL == 'true' }}
    needs: check-draft
    runs-on: ubuntu-22.04
    steps:
    - uses: mymindstorm/setup-emsdk@v16
      with:
        version: 'latest'

    - name: Setup
      shell: bash
      run: |
        python3 scripts/ci/retry.py -- git clone https://github.com/duckdb/duckdb-wasm
        cd duckdb-wasm
        git checkout "${{ env.DUCKDB_WASM_VERSION }}"
        shopt -s nullglob
        for filename in ../.github/patches/duckdb-wasm/*.patch; do
          git apply "$filename"
        done
        git submodule init
        git submodule update
        git rm -r submodules/duckdb

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        path: duckdb-wasm/submodules/duckdb

    - name: Install tools
      shell: bash
      run: make -C duckdb-wasm/submodules/duckdb toolsci

    - name: Setup
      shell: bash
      run: |
        cd duckdb-wasm
        make patch_duckdb || echo "done"

    - uses: ./.github/actions/ccache-action

    - uses: ./.github/actions/cleanup_runner

    - uses: ./.github/actions/swap_space

    - name: Print version
      shell: bash
      run: |
        emcc --version

    - name: Build WebAssembly MVP
      shell: bash
      run: |
        cd duckdb-wasm
        bash scripts/wasm_build_lib.sh relsize mvp "$PWD/submodules/duckdb"

    - name: Build WebAssembly EH
      shell: bash
      run: |
        cd duckdb-wasm
        bash scripts/wasm_build_lib.sh relsize eh "$PWD/submodules/duckdb"

    - name: Build WebAssembly COI
      shell: bash
      run: |
        cd duckdb-wasm
        bash scripts/wasm_build_lib.sh relsize coi "$PWD/submodules/duckdb"

    - name: Package
      shell: bash
      run: |
        zip -r duckdb-wasm32.zip duckdb-wasm/packages/duckdb-wasm/src/bindings

    - uses: actions/upload-artifact@v7
      with:
        name: duckdb-wasm32
        path: |
          duckdb-wasm32.zip

  hash-zero:
   name: Hash Zero
   runs-on: ubuntu-24.04
   needs: linux-memory-leaks
   env:
     GEN: ninja
     CORE_EXTENSIONS: "icu;parquet;tpch;tpcds;fts;json;inet"
     HASH_ZERO: 1
     DISABLE_SANITIZER: 1
     LSAN_OPTIONS: suppressions=${{ github.workspace }}/.sanitizer-leak-suppressions.txt
     DUCKDB_TEST_DESCRIPTION: 'Compiled with HASH_ZERO=1. Use require no_hash_zero to skip.'

   steps:
     - uses: actions/checkout@v6
       with:
         fetch-depth: 0

     - name: Install
       shell: bash
       run: python3 scripts/ci/retry.py -- make toolsci

     - uses: ./.github/actions/ccache-action

     - uses: ./.github/actions/cleanup_runner

     - uses: ./.github/actions/swap_space

     - name: Build
       shell: bash
       run: python3 scripts/ci/retry.py -- make relassert

     - name: Test
       shell: bash
       run: python3 scripts/ci/run_tests.py --test-config=test/configs/hash_zero.json build/relassert/test/unittest


  bwc_build:
    name: Build DuckDB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update -y -qq && sudo apt-get install -y -qq ninja-build libcurl4-openssl-dev

      - name: Setup ccache
        uses: ./.github/actions/ccache-action

      - name: Build DuckDB
        run: |
          python3 scripts/ci/retry.py -- make release \
            EXTENSION_CONFIGS='.github/config/extensions/httpfs.cmake;.github/config/extensions/test-utils.cmake;.github/config/extensions/inet.cmake' \
            DUCKDB_EXTENSIONS='tpcds;icu;autocomplete;tpch;json'

      - name: Upload DuckDB binary
        uses: actions/upload-artifact@v7
        with:
          name: duckdb-binary
          path: build/release/duckdb

  bwc-test:
    name: BWC Test (DuckDB ${{ matrix.old_duckdb_version }})
    runs-on: ubuntu-latest
    needs: bwc_build
    strategy:
      fail-fast: false
      matrix:
        old_duckdb_version:
          - v1.1.0
          - v1.1.1
          - v1.1.2
          - v1.1.3
          - v1.2.0
          - v1.2.1
          - v1.2.2
          - v1.3.0
          - v1.3.1
          - v1.3.2
          - v1.4.0
          - v1.4.1
          - v1.4.2
          - v1.4.3
          - v1.4.4
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Download DuckDB binary
        uses: actions/download-artifact@v8
        with:
          name: duckdb-binary
          path: build/release

      - name: Make DuckDB binary executable
        run: chmod +x build/release/duckdb

      - name: Install Python dependencies
        run: python3 scripts/ci/retry.py -- pip install duckdb git+https://github.com/duckdb/duckdb-sqllogictest-python.git

      - name: Download BWC cache
        if: ${{ vars.ENABLE_BWC_CACHE_DOWNLOAD == 'true' }}
        run: |
          VERSION=${{ matrix.old_duckdb_version }}
          CACHE_ARCHIVE="runtime_${VERSION}.tar.gz"
          RUNTIME_DIR="duckdb_unittest_tempdir/bwc/runtime"
          mkdir -p "${RUNTIME_DIR}"

          # Download the cache archive from test-utils repo
          DOWNLOAD_URL="https://raw.githubusercontent.com/duckdb/bwc-test-utils/main/cache/${CACHE_ARCHIVE}"
          HTTP_CODE=$(curl -sL -w '%{http_code}' -o "/tmp/${CACHE_ARCHIVE}" "${DOWNLOAD_URL}" || true)

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "Failed to download cache for ${VERSION} (HTTP ${HTTP_CODE})"
            exit 1
          fi

          tar xzf "/tmp/${CACHE_ARCHIVE}" -C "${RUNTIME_DIR}"
          CACHED=$(find "${RUNTIME_DIR}/${VERSION}" -name "*.plan.bin" | wc -l)
          echo "Extracted cache for ${VERSION}: ${CACHED} cached test plans"

      - name: Run BWC tests
        run: python3.11 test/bwc/runner.py --old_duckdb_version=${{ matrix.old_duckdb_version }}

      - name: Export BWC cache
        if: always()
        run: python3.11 test/bwc/export_cache.py --version ${{ matrix.old_duckdb_version }} --output-dir duckdb_unittest_tempdir/bwc/cache

      - name: Upload BWC cache
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bwc-cache-${{ matrix.old_duckdb_version }}
          path: duckdb_unittest_tempdir/bwc/cache/runtime_${{ matrix.old_duckdb_version }}.tar.gz

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bwc-test-results-${{ matrix.old_duckdb_version }}
          path: |
            duckdb_unittest_tempdir/bwc/tests_summary_*.txt
            duckdb_unittest_tempdir/bwc/reports/test_report_*.duckdb

  summary:
    name: BWC Test Summary
    runs-on: ubuntu-24.04
    needs: bwc-test
    if: always()
    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: bwc-test-results-*
          merge-multiple: true

      - name: Aggregate results
        run: |
          echo "============================================================"
          echo "BWC Test Summary"
          echo "============================================================"
          failed=0
          for summary in tests_summary_*.txt; do
            [ -f "$summary" ] || continue
            version="${summary#tests_summary_}"
            version="${version%.txt}"
            failures=$(grep '# FAILED' "$summary" || true)
            if [ -n "$failures" ]; then
              echo ""
              echo "Failed tests for DuckDB version '$version':"
              echo "$failures" | while read -r line; do
                echo "  $line"
              done
              failed=1
            fi
          done
          echo "============================================================"
          if [ "$failed" -eq 1 ]; then
            echo "Some BWC tests failed."
            exit 1
          else
            echo "All BWC tests passed."
          fi

  # checks that cmake-generated project is consistent on re-configure
  cmake-reconfigure-check:
    name: CMake Reconfigure Check
    runs-on: ${{ matrix.os }}
    needs: check-draft
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Create Dir
        run: |
          mkdir build

      - name: Configure
        working-directory: build
        run: |
          cmake .. -G Ninja

      - name: Reconfigure
        working-directory: build
        run: |
          cp build.ninja clean_build.ninja
          cmake .. -G Ninja

      - name: Cleanup Build Files
        working-directory: build
        run: |
          perl -i -ne 'print unless /TARGET_COMPILE_PDB/' clean_build.ninja
          perl -i -ne 'print unless /TARGET_COMPILE_PDB/' build.ninja
          perl -i -ne 'print unless /TARGET_PDB/' clean_build.ninja
          perl -i -ne 'print unless /TARGET_PDB/' build.ninja
          perl -i -ne 'print unless /DuckDBConfig.cmake.in/' clean_build.ninja
          perl -i -ne 'print unless /DuckDBConfig.cmake.in/' build.ninja

      - name: Compare Build Files
        working-directory: build
        run: |
          diff -u clean_build.ninja build.ninja
