name: Windows
on:
  workflow_call:
    inputs:
      override_git_describe:
        type: string
      git_ref:
        type: string
      skip_tests:
        type: boolean
      run_all:
        type: boolean
      runner_windows_2022_x64:
        type: string
  workflow_dispatch:
    inputs:
      override_git_describe:
        type: string
      git_ref:
        type: string
      skip_tests:
        type: boolean
        default: false
      run_all:
        type: boolean
        default: true
      runner_windows_2022_x64:
        type: string

concurrency:
  group: windows-${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}-${{ inputs.override_git_describe }}
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  OVERRIDE_GIT_DESCRIBE: ${{ inputs.override_git_describe }}
  AZURE_CODESIGN_ENDPOINT: https://eus.codesigning.azure.net/
  AZURE_CODESIGN_ACCOUNT: duckdb-signing-2
  AZURE_CODESIGN_PROFILE: duckdb-certificate-profile

jobs:
 win-release-64:
    # Builds binaries for windows_amd64
    name: Windows (64 Bit)
    runs-on: ${{ inputs.runner_windows_2022_x64 || 'windows-2022' }}
    env:
      GEN: ninja
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ inputs.git_ref }}

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - uses: ./.github/actions/ccache-action
    - uses: ilammy/msvc-dev-cmd@v1

    - name: Build
      shell: bash
      run: |
        python scripts/ci/retry.py -- python scripts/windows_ci.py
        python scripts/ci/retry.py -- make windows_release

    - name: Set DUCKDB_INSTALL_LIB for ADBC tests
      shell: pwsh
      run: echo "DUCKDB_INSTALL_LIB=$((Get-ChildItem -Recurse -Filter "duckdb.dll" | Select-Object -First 1).FullName)" >> $env:GITHUB_ENV

    - name: Test DUCKDB_INSTALL_LIB variable
      shell: bash
      run: echo "$DUCKDB_INSTALL_LIB"

    - name: Test
      shell: bash
      if: ${{ !inputs.skip_tests }}
      run: |
        python scripts/ci/run_tests.py test/unittest.exe

    - name: Test with VS2019 C++ stdlib
      shell: bash
      if: ${{ !inputs.skip_tests }}
      run: |
        python scripts/ci/retry.py -- curl -L --output ./test/msvcp140.dll https://blobs.duckdb.org/ci/msvcp140.dll
        ls ./test
        python scripts/ci/run_tests.py test/unittest.exe
        rm ./test/msvcp140.dll

    - name: Tools Test
      shell: bash
      if: ${{ !inputs.skip_tests }}
      run: |
        python scripts/ci/retry.py -- python -m pip install pytest
        python -m pytest tools/shell/tests --shell-binary duckdb.exe

    - name: Sign files with Azure Trusted Signing (TM)
      if: github.repository == 'duckdb/duckdb' && github.event_name != 'pull_request'
      uses: azure/trusted-signing-action@v0
      with:
        azure-tenant-id:              ${{ secrets.AZURE_CODESIGN_TENANT_ID }}
        azure-client-id:              ${{ secrets.AZURE_CODESIGN_CLIENT_ID }}
        azure-client-secret:          ${{ secrets.AZURE_CODESIGN_CLIENT_SECRET }}
        endpoint:                     ${{ env.AZURE_CODESIGN_ENDPOINT }}
        trusted-signing-account-name: ${{ env.AZURE_CODESIGN_ACCOUNT }}
        certificate-profile-name:     ${{ env.AZURE_CODESIGN_PROFILE }}
        files-folder:                 ${{ github.workspace }}
        files-folder-filter:          exe,dll
        files-folder-recurse:         true
        file-digest:                  SHA256
        timestamp-rfc3161:            http://timestamp.acs.microsoft.com
        timestamp-digest:             SHA256

    - name: Deploy
      shell: bash
      env:
        AWS_ENDPOINT_URL: ${{ secrets.S3_DUCKDB_STAGING_ENDPOINT }}
        AWS_ACCESS_KEY_ID: ${{ secrets.S3_DUCKDB_STAGING_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_DUCKDB_STAGING_KEY }}
      run: |
        python scripts/amalgamation.py
        /c/msys64/usr/bin/bash.exe -lc "pacman -Sy --noconfirm zip"
        /c/msys64/usr/bin/zip.exe -j duckdb_cli-windows-amd64.zip duckdb.exe
        /c/msys64/usr/bin/zip.exe -j libduckdb-windows-amd64.zip src/duckdb.dll src/duckdb.lib src/amalgamation/duckdb.hpp src/include/duckdb.h
        ./scripts/upload-assets-to-staging.sh github_release libduckdb-windows-amd64.zip duckdb_cli-windows-amd64.zip

    - uses: actions/upload-artifact@v7
      with:
        name: duckdb-binaries-windows-amd64
        path: |
          libduckdb-windows-amd64.zip
          duckdb_cli-windows-amd64.zip

    - uses: ilammy/msvc-dev-cmd@v1
    - name: Duckdb.dll export symbols with C++ on Windows
      shell: bash
      run: cl -I src/include examples/embedded-c++-windows/cppintegration.cpp -link src/duckdb.lib

 win-release-32:
    name: Windows (32 Bit)
    needs:
      - win-release-64
    if: ${{ github.ref_name == 'main' || github.repository != 'duckdb/duckdb' || inputs.run_all == 'true' }}
    runs-on: ${{ inputs.runner_windows_2022_x64 || 'windows-2022' }}
    env:
      GEN: ninja

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ inputs.git_ref }}

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - uses: ./.github/actions/ccache-action
    - uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64_x86

    - name: Build
      shell: bash
      run: |
        python scripts/ci/retry.py -- make windows_release_32

    - name: Test
      shell: bash
      run: python scripts/ci/run_tests.py test/unittest.exe

    - name: Tools Test
      shell: bash
      run: |
        python scripts/ci/retry.py -- python -m pip install pytest
        python -m pytest tools/shell/tests --shell-binary duckdb.exe

 win-release-arm64:
   name: Windows (ARM64)
   needs:
    - win-release-64
   if: ${{ github.ref_name == 'main' || github.repository != 'duckdb/duckdb' || inputs.run_all }}
   runs-on: windows-latest
   env:
     GEN: ninja

   steps:
     - uses: actions/checkout@v6
       with:
         fetch-depth: 0
         ref: ${{ inputs.git_ref }}

     - uses: actions/setup-python@v6
       with:
         python-version: '3.12'

     - uses: ./.github/actions/ccache-action
     - uses: ilammy/msvc-dev-cmd@v1
       with:
         arch: amd64_arm64

     - name: Build
       shell: bash
       run: |
         python scripts/ci/retry.py -- make DUCKDB_PLATFORM=windows_arm64 EXTRA_CMAKE_VARIABLES=-DBUILD_UNITTESTS=FALSE windows_release

     - name: Sign files with Azure Trusted Signing (TM)
       if: github.repository == 'duckdb/duckdb' && github.event_name != 'pull_request'
       uses: azure/trusted-signing-action@v0
       with:
         azure-tenant-id:              ${{ secrets.AZURE_CODESIGN_TENANT_ID }}
         azure-client-id:              ${{ secrets.AZURE_CODESIGN_CLIENT_ID }}
         azure-client-secret:          ${{ secrets.AZURE_CODESIGN_CLIENT_SECRET }}
         endpoint:                     ${{ env.AZURE_CODESIGN_ENDPOINT }}
         trusted-signing-account-name: ${{ env.AZURE_CODESIGN_ACCOUNT }}
         certificate-profile-name:     ${{ env.AZURE_CODESIGN_PROFILE }}
         files-folder:                 ${{ github.workspace }}
         files-folder-filter:          exe,dll
         files-folder-recurse:         true
         file-digest:                  SHA256
         timestamp-rfc3161:            http://timestamp.acs.microsoft.com
         timestamp-digest:             SHA256

     - name: Deploy
       shell: bash
       env:
         AWS_ENDPOINT_URL: ${{ secrets.S3_DUCKDB_STAGING_ENDPOINT }}
         AWS_ACCESS_KEY_ID: ${{ secrets.S3_DUCKDB_STAGING_ID }}
         AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_DUCKDB_STAGING_KEY }}
       run: |
         python scripts/amalgamation.py
         /c/msys64/usr/bin/bash.exe -lc "pacman -Sy --noconfirm zip"
         /c/msys64/usr/bin/zip.exe -j duckdb_cli-windows-arm64.zip duckdb.exe
         /c/msys64/usr/bin/zip.exe -j libduckdb-windows-arm64.zip src/duckdb.dll src/duckdb.lib src/amalgamation/duckdb.hpp src/include/duckdb.h
         ./scripts/upload-assets-to-staging.sh github_release libduckdb-windows-arm64.zip duckdb_cli-windows-arm64.zip

     - uses: actions/upload-artifact@v7
       with:
         name: duckdb-binaries-windows-arm64
         path: |
           libduckdb-windows-arm64.zip
           duckdb_cli-windows-arm64.zip

 mingw:
     name: MinGW (64 Bit)
     needs:
      - win-release-64
     if: ${{ !inputs.skip_tests }}
     runs-on: ${{ inputs.runner_windows_2022_x64 || 'windows-2022' }}
     env:
       GEN: ninja
       ENABLE_EXTENSION_AUTOLOADING: 1
       ENABLE_EXTENSION_AUTOINSTALL: 1
     steps:
       - uses: actions/checkout@v6
         with:
           ref: ${{ inputs.git_ref }}

       - uses: actions/setup-python@v6
         with:
           python-version: '3.12'

       - name: Dependencies
         shell: bash
         run: |
           python scripts/ci/retry.py -- choco install \
             ccache \
             make \
             --no-progress
           python scripts/ci/retry.py -- choco install \
             mingw --version 14.2.0 \
             --no-progress

       - uses: ./.github/actions/ccache-action

       - name: Build Environment
         shell: bash
         run: |
           {
             # bash from Git
             echo 'C:/Program Files/Git/bin'
             # make, ninja and ccache from Chocolatey
             echo 'C:/ProgramData/Chocolatey/bin'
             # g++ from Chocolatey
             echo 'C:/ProgramData/mingw64/mingw64/bin'
           } >> "${GITHUB_PATH}"

       - name: Build Environment Check
         shell: bash
         run: |
           where bash
           bash --version
           where make
           make --version
           where ninja
           ninja --version
           where ccache
           ccache --version
           where g++
           g++ --version
           echo %PATH%

       - name: MinGW Runtime Diagnostics
         shell: bash
         run: |
           set -x
           echo "PWD=$PWD"
           echo "PATH=$PATH"
           where python
           python --version
           where unittest.exe || true
           if [ -f build/release/test/unittest.exe ]; then
             ls -l build/release/test/unittest.exe
           fi
           echo "Nearby DLLs and EXEs:"
           find build/release -maxdepth 3 \( -name '*.dll' -o -name '*.exe' \) | sort || true
           /c/Windows/System32/cmd.exe /c "where libstdc++-6.dll" || true
           /c/Windows/System32/cmd.exe /c "where libgcc_s_seh-1.dll" || true
           /c/Windows/System32/cmd.exe /c "where libwinpthread-1.dll" || true
           objdump -p build/release/test/unittest.exe | sed -n '/DLL Name:/p' || true
           ./build/release/test/unittest.exe --list-tests || true

       - name: Build
         run: python scripts/ci/retry.py -- make release

       - name: Test
         run: make unittest_release SKIP_BUILD=1

 win-packaged-upload:
   runs-on: windows-latest
   needs:
     - win-release-64
     - win-release-arm64
   steps:
    - uses: actions/download-artifact@v5
      with:
        name: duckdb-binaries-windows-arm64

    - uses: actions/download-artifact@v5
      with:
        name: duckdb-binaries-windows-amd64

    - uses: actions/upload-artifact@v7
      with:
        name: duckdb-binaries-windows
        path: |
          libduckdb-windows-amd64.zip
          duckdb_cli-windows-amd64.zip
          libduckdb-windows-arm64.zip
          duckdb_cli-windows-arm64.zip
