name: 'Setup MSVC Environment'
description: 'Configure Visual Studio build tools environment variables via VsDevCmd'
inputs:
  arch:
    description: 'Target architecture passed to VsDevCmd -arch'
    required: false
    default: 'x64'
  host_arch:
    description: 'Host architecture passed to VsDevCmd -host_arch'
    required: false
    default: 'x64'
runs:
  using: 'composite'
  steps:
    - name: Setup MSVC variables
      shell: pwsh
      run: |
        $arch = '${{ inputs.arch }}'
        $hostArch = '${{ inputs.host_arch }}'
        $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
        if (!(Test-Path $vswhere)) {
          throw "vswhere not found at $vswhere"
        }
        $installationPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        if (-not $installationPath) {
          throw "Visual Studio with VC tools not found"
        }
        $vsDevCmd = Join-Path $installationPath 'Common7\Tools\VsDevCmd.bat'
        if (!(Test-Path $vsDevCmd)) {
          throw "VsDevCmd.bat not found at $vsDevCmd"
        }
        cmd /c "`"$vsDevCmd`" -no_logo -arch=$arch -host_arch=$hostArch && set" |
          ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              "$($matches[1])=$($matches[2])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }
