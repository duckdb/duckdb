# Trampoline transformer metadata.
#
# Rules not listed here are treated as generated by default. This file only
# describes rules that need explicit trampoline handling.

rules:
  Program:
    mode: excluded

  TopLevelStatement:
    mode: manual
    init: InitializeTopLevelStatementTrampoline
    finalize: FinalizeTopLevelStatementTrampoline

  Statement:
    mode: manual
    init: InitializeStatementTrampoline
    finalize: FinalizeStatementTrampoline

  PivotStatement:
    mode: manual
    init: InitializePivotStatementTrampoline
    finalize: FinalizePivotStatementTrampoline

  CommentValue:
    mode: manual
    init: InitializeCommentValueTrampoline
    finalize: FinalizeCommentValueTrampoline

  ColId:
    mode: manual
    init: InitializeColIdTrampoline
    finalize: FinalizeColIdTrampoline

  ColLabel:
    mode: manual
    init: InitializeColLabelTrampoline
    finalize: FinalizeColLabelTrampoline

  DotColLabel:
    mode: manual
    init: InitializeDotColLabelTrampoline
    finalize: FinalizeDotColLabelTrampoline

  Expression:
    mode: forward

  PrefixExpression:
    mode: manual
    init: InitializePrefixExpressionTrampoline
    finalize: FinalizePrefixExpressionTrampoline

  OverClause:
    mode: manual
    init: InitializeOverClauseTrampoline
    finalize: FinalizeOverClauseTrampoline

  SelectStatementInternal:
    mode: manual
    init: InitializeSelectStatementInternalTrampoline
    finalize: FinalizeSelectStatementInternalTrampoline

  SimpleSelect:
    mode: manual
    init: InitializeSimpleSelectTrampoline
    finalize: FinalizeSimpleSelectTrampoline

  TableRef:
    mode: manual
    init: InitializeTableRefTrampoline
    finalize: FinalizeTableRefTrampoline

  WithClause:
    mode: manual
    init: InitializeWithClauseTrampoline
    finalize: FinalizeWithClauseTrampoline

  WindowDefinition:
    mode: manual
    init: InitializeWindowDefinitionTrampoline
    finalize: FinalizeWindowDefinitionTrampoline
