# Trampoline transformer metadata.
#
# Rules not listed here are treated as generated by default. This file only
# describes rules that need explicit trampoline handling.

rules:
  Program:
    mode: excluded

  TopLevelStatement:
    mode: manual
    init: InitializeTopLevelStatementTrampoline
    finalize: FinalizeTopLevelStatementTrampoline

  Statement:
    mode: manual
    init: InitializeStatementTrampoline
    finalize: FinalizeStatementTrampoline

  PivotStatement:
    mode: manual
    init: InitializePivotStatementTrampoline
    finalize: FinalizePivotStatementTrampoline

  CommentValue:
    mode: manual
    init: InitializeCommentValueTrampoline
    finalize: FinalizeCommentValueTrampoline

  UpdateExtensionsStatement:
    mode: manual
    init: InitializeUpdateExtensionsStatementTrampoline
    finalize: FinalizeUpdateExtensionsStatementTrampoline

  ExecuteStatement:
    mode: manual
    init: InitializeExecuteStatementTrampoline
    finalize: FinalizeExecuteStatementTrampoline

  PrepareStatement:
    mode: manual
    init: InitializePrepareStatementTrampoline
    finalize: FinalizePrepareStatementTrampoline

  DescribeStatement:
    mode: manual
    init: InitializeDescribeStatementTrampoline
    finalize: FinalizeDescribeStatementTrampoline

  ExplainOptionName:
    mode: manual
    init: InitializeExplainOptionNameTrampoline
    finalize: FinalizeExplainOptionNameTrampoline

  ColId:
    mode: manual
    init: InitializeColIdTrampoline
    finalize: FinalizeColIdTrampoline

  ColLabel:
    mode: manual
    init: InitializeColLabelTrampoline
    finalize: FinalizeColLabelTrampoline

  DotColLabel:
    mode: manual
    init: InitializeDotColLabelTrampoline
    finalize: FinalizeDotColLabelTrampoline

  IdentifierOrStringLiteral:
    mode: manual
    init: InitializeIdentifierOrStringLiteralTrampoline
    finalize: FinalizeIdentifierOrStringLiteralTrampoline

  ReservedIdentifierOrStringLiteral:
    mode: manual
    init: InitializeReservedIdentifierOrStringLiteralTrampoline
    finalize: FinalizeReservedIdentifierOrStringLiteralTrampoline

  Expression:
    mode: forward

  LiteralExpression:
    mode: manual
    init: InitializeLiteralExpressionTrampoline
    finalize: FinalizeLiteralExpressionTrampoline

  PrefixExpression:
    mode: manual
    init: InitializePrefixExpressionTrampoline
    finalize: FinalizePrefixExpressionTrampoline

  FunctionIdentifier:
    mode: manual
    init: InitializeFunctionIdentifierTrampoline
    finalize: FinalizeFunctionIdentifierTrampoline

  ColumnReference:
    mode: manual
    init: InitializeColumnReferenceTrampoline
    finalize: FinalizeColumnReferenceTrampoline

  ColLabelOrString:
    mode: manual
    init: InitializeColLabelOrStringTrampoline
    finalize: FinalizeColLabelOrStringTrampoline

  OverClause:
    mode: manual
    init: InitializeOverClauseTrampoline
    finalize: FinalizeOverClauseTrampoline

  SelectStatementInternal:
    mode: manual
    init: InitializeSelectStatementInternalTrampoline
    finalize: FinalizeSelectStatementInternalTrampoline

  NamedParameter:
    mode: manual
    init: InitializeNamedParameterTrampoline
    finalize: FinalizeNamedParameterTrampoline

  SimpleSelect:
    mode: manual
    init: InitializeSimpleSelectTrampoline
    finalize: FinalizeSimpleSelectTrampoline

  TableRef:
    mode: manual
    init: InitializeTableRefTrampoline
    finalize: FinalizeTableRefTrampoline

  WithClause:
    mode: manual
    init: InitializeWithClauseTrampoline
    finalize: FinalizeWithClauseTrampoline

  WindowDefinition:
    mode: manual
    init: InitializeWindowDefinitionTrampoline
    finalize: FinalizeWindowDefinitionTrampoline
