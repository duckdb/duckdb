# grammar_types.yml
#
# Maps grammar rules to their expected C++ return types, grouped by type category.
# Used by scripts/parser/generate_transformer.py to generate stubs with the
# correct return type instead of the placeholder unique_ptr<SQLStatement>.
#
# Structure:
#   <CategoryName>:
#     type: "<C++ return type>"   # exact type as it appears in the declaration
#     rules:                      # grammar rule names that return this type
#       - RuleName
#       - ...
#
# Edge cases:
#   Rules with unique or complex return types that don't share a category with
#   other rules are listed in the top-level 'overrides' map:
#     overrides:
#       RuleName: "<C++ return type>"
#
# Rules handled by RegisterEnum() are NOT listed here (they are auto-detected
# by generate_transformer.py from peg_transformer_factory.cpp).
#
# excluded_rules: rules intentionally skipped during auto-generation of Internal
# wrappers. When encountered as children in auto-generated sequence rules they
# are treated as skip elements UNLESS they also have a type entry, in which case
# the type entry takes precedence and their value IS extracted. Keep this list
# for syntax-only rules and temporary manual exceptions; matcher-provided rules
# belong in matcher_rule_overrides instead.
# Note: some entries (e.g. SingleArrowPair, CommentValue,
# IntervalNumber, Program) also appear in type categories because
# they are manually implemented and referenced as children by auto-generated
# rules. The excluded status only suppresses Internal auto-generation.
#
# matcher_rule_overrides: named grammar rules that matcher.cpp replaces with a
# specialized Matcher instead of constructing from the grammar rule body. The
# transformer generator should treat only `identifier` and `reserved_identifier`
# entries as direct IdentifierParseResult-producing rules.
#
# optional_value_grammars: grammar stems whose generated wrappers represent
# Optional(...) semantic children as optional<T> and syntax-only Optional(...)
# children as bool presence flags. Grammars not listed here keep the legacy
# default-initializer representation while their typed bodies are migrated.

optional_value_grammars:
  - expression
  - select

