[files]
extend-exclude = [
  "/benchmark/",
  "/data/",
  "/extension/icu/",
  "/extension/jemalloc/",
  "/extension/tpcds/dsdgen/",
  "/extension/tpch/dbgen/",
  "/test/",
  "/tools/juliapkg/",
  "/tools/swift/duckdb-swift/",
  "/tools/shell/tests/test_*.py",
  "third_party",
]

[default]
extend-ignore-re = [
  # Ignore short, intentionally random SQL literals (e.g. 'ABC')
  "'[A-Z]{2,4}'",
  "PNGs?",
]

[default.extend-words]
# Legal language
stichting = "stichting"

# Project-specific acronyms
nd = "nd"
eit = "eit"
ser = "ser"
siz = "siz"
cpy = "cpy"
Cpy = "Cpy"
acount = "acount"

# API identifiers (to avoid breaking code)
writeable = "writeable"
Writeable = "Writeable"
millenium = "millenium"
Millenium = "Millenium"
seeked = "seeked"
larg = "larg"
rarg = "rarg"
deliminated = "deliminated"
