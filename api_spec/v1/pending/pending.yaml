module: pending
functions:
  pending_prepared:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement to execute.
      out_result:
        type: pending_result
        indirection: 1
        kind: OUT
        description: The pending query result.
    return_type: state
    description: |
      Executes the prepared statement with the given bound parameters, and returns a pending result.
      The pending result represents an intermediate structure for a query that is not yet fully executed.
      The pending result can be used to incrementally execute a query, returning control to the client between tasks.

      Note that after calling `duckdb_pending_prepared`, the pending result should always be destroyed using
      `duckdb_destroy_pending`, even if this function returns DuckDBError.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure.'
  destroy_pending:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    role: destructor
    belongs_to: pending_result
    parameters:
      pending_result:
        type: pending_result
        indirection: 1
        description: The pending result to destroy.
    return_type: opaque
    description: |
      Closes the pending result and de-allocates all memory allocated for the result.
  pending_error:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      pending_result:
        type: pending_result
        description: The pending result to fetch the error from.
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Returns the error message contained within the pending result.

      The result of this function must not be freed. It will be cleaned up when `duckdb_destroy_pending` is called.
    return_description: The error of the pending result.
  pending_execute_task:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      pending_result:
        type: pending_result
        description: The pending result to execute a task within.
    return_type: pending_state
    description: |
      Executes a single task within the query, returning whether or not the query is ready.

      If this returns DUCKDB_PENDING_RESULT_READY, the duckdb_execute_pending function can be called to obtain the result.
      If this returns DUCKDB_PENDING_RESULT_NOT_READY, the duckdb_pending_execute_task function should be called again.
      If this returns DUCKDB_PENDING_ERROR, an error occurred during execution.

      The error message can be obtained by calling duckdb_pending_error on the pending_result.
    return_description: The state of the pending result after the execution.
  pending_execute_check_state:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      pending_result:
        type: pending_result
        description: The pending result.
    return_type: pending_state
    description: |
      If this returns DUCKDB_PENDING_RESULT_READY, the duckdb_execute_pending function can be called to obtain the result.
      If this returns DUCKDB_PENDING_RESULT_NOT_READY, the duckdb_pending_execute_check_state function should be called again.
      If this returns DUCKDB_PENDING_ERROR, an error occurred during execution.

      The error message can be obtained by calling duckdb_pending_error on the pending_result.
    return_description: The state of the pending result.
  execute_pending:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      pending_result:
        type: pending_result
        description: The pending result to execute.
      out_result:
        type: result
        indirection: 1
        kind: OUT
        description: The result object.
    return_type: state
    description: |
      Fully execute a pending query result, returning the final query result.

      If duckdb_pending_execute_task has been called until DUCKDB_PENDING_RESULT_READY was returned, this will return fast.
      Otherwise, all remaining tasks must be executed first.

      Note that the result must be freed with `duckdb_destroy_result`.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure.'
  pending_execution_is_finished:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      pending_state:
        type: pending_state
        description: The pending state on which to decide whether to finish execution.
    return_type: bool
    description: |
      Returns whether a duckdb_pending_state is finished executing. For example if `pending_state` is
      DUCKDB_PENDING_RESULT_READY, this function will return true.
    return_description: Boolean indicating pending execution should be considered finished.
