module: catalog
functions:
  client_context_get_catalog:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      context:
        type: client_context
        description: The client context.
      catalog_name:
        type: char
        indirection: 1
        const: true
        description: The name of the catalog.
    return_type: catalog
    description: |
      Retrieve a database catalog instance by name.
      This function can only be called from within the context of an active transaction, e.g. during execution of a registered function callback. Otherwise returns `nullptr`.
    return_description: The resulting catalog instance, or `nullptr` if called from outside an active transaction or if a catalog with the specified name does not exist. Must be destroyed with `duckdb_destroy_catalog`
  catalog_get_type_name:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      catalog:
        type: catalog
        description: The catalog.
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Retrieve the "type name" of the given catalog.
      E.g. for a DuckDB database, this returns 'duckdb'.
      The returned string is owned by the catalog and remains valid until the catalog is destroyed.
    return_description: The type name of the catalog.
  catalog_get_entry:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      catalog:
        type: catalog
        description: The catalog.
      context:
        type: client_context
        description: The client context.
      entry_type:
        type: catalog_entry_type
        description: The type of the catalog entry to retrieve.
      schema_name:
        type: char
        indirection: 1
        const: true
        description: The schema name of the catalog entry.
      entry_name:
        type: char
        indirection: 1
        const: true
        description: The name of the catalog entry.
    return_type: catalog_entry
    description: |
      Retrieve a catalog entry from the given catalog by type, schema name and entry name.
      The returned catalog entry remains valid for the duration of the current transaction.
    return_description: The resulting catalog entry, or `nullptr` if no such entry exists. Must be destroyed with `duckdb_destroy_catalog_entry`. Remains valid for the duration of the current transaction.
  destroy_catalog:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    role: destructor
    belongs_to: catalog
    parameters:
      catalog:
        type: catalog
        indirection: 1
        description: The catalog instance to destroy.
    return_type: opaque
    description: |
      Destroys the given catalog instance.

      Note that this does not actually "drop" the contents of the catalog; it merely frees the C API handle.
  catalog_entry_get_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      entry:
        type: catalog_entry
        description: The catalog entry.
    return_type: catalog_entry_type
    description: |
      Get the type of the given catalog entry.
    return_description: The type of the catalog entry.
  catalog_entry_get_name:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      entry:
        type: catalog_entry
        description: The catalog entry.
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Get the name of the given catalog entry.
    return_description: The name of the catalog entry. The returned string is owned by the catalog entry and remains valid until the catalog entry is destroyed.
  destroy_catalog_entry:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    role: destructor
    belongs_to: catalog_entry
    parameters:
      entry:
        type: catalog_entry
        indirection: 1
        description: The catalog entry instance to destroy.
    return_type: opaque
    description: |
      Destroys the given catalog entry instance.

      Note that this does not actually "drop" the catalog entry from the database catalog; it merely frees the C API handle.
