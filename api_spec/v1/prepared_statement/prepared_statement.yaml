        type: hugeint
    return_type: state
    description: |
      Binds a duckdb_hugeint value to the prepared statement at the specified index.
  bind_uhugeint:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
