module: prepared_statement
functions:
  prepare:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    role: constructor
    belongs_to: prepared_statement
    parameters:
      connection:
        type: connection
        description: The connection object
      query:
        type: char
        indirection: 1
        const: true
        description: The SQL query to prepare
      out_prepared_statement:
        type: prepared_statement
        indirection: 1
        kind: OUT
        description: The resulting prepared statement object
    return_type: state
    description: |
      Create a prepared statement object from a query.

      Note that after calling `duckdb_prepare`, the prepared statement should always be destroyed using
      `duckdb_destroy_prepare`, even if the prepare fails.

      If the prepare fails, `duckdb_prepare_error` can be called to obtain the reason why the prepare failed.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure.'
  destroy_prepare:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    role: destructor
    belongs_to: prepared_statement
    parameters:
      prepared_statement:
        type: prepared_statement
        indirection: 1
        description: The prepared statement to destroy.
    return_type: opaque
    description: |
      Closes the prepared statement and de-allocates all memory allocated for the statement.
  prepare_error:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement to obtain the error from.
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Returns the error message associated with the given prepared statement.
      If the prepared statement has no error message, this returns `nullptr` instead.

      The error message should not be freed. It will be de-allocated when `duckdb_destroy_prepare` is called.
    return_description: The error message, or `nullptr` if there is none.
  nparams:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement to obtain the number of parameters for.
    return_type: idx
    description: |
      Returns the number of parameters that can be provided to the given prepared statement.

      Returns 0 if the query was not successfully prepared.
  parameter_name:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement for which to get the parameter name from.
      index:
        type: idx
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Returns the name used to identify the parameter
      The returned string should be freed using `duckdb_free`.

      Returns NULL if the index is out of range for the provided prepared statement.
  param_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement.
      param_idx:
        type: idx
        description: The parameter index.
    return_type: type
    description: |
      Returns the parameter type for the parameter at the given index.

      Returns `DUCKDB_TYPE_INVALID` if the parameter index is out of range or the statement was not successfully prepared.
    return_description: The parameter type
  param_logical_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement.
      param_idx:
        type: idx
        description: The parameter index.
    return_type: logical_type
    description: |
      Returns the logical type for the parameter at the given index.

      Returns `nullptr` if the parameter index is out of range or the statement was not successfully prepared.

      The return type of this call should be destroyed with `duckdb_destroy_logical_type`.
    return_description: The logical type of the parameter
  clear_bindings:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
    return_type: state
    description: |
      Clear the params bind to the prepared statement.
  prepared_statement_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      statement:
        type: prepared_statement
        description: The prepared statement.
    return_type: statement_type
    description: |
      Returns the statement type of the statement to be executed
    return_description: duckdb_statement_type value or DUCKDB_STATEMENT_TYPE_INVALID
  prepared_statement_column_count:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement.
    return_type: idx
    description: |
      Returns the number of columns present in a the result of the prepared statement. If any of the column types are invalid, the result will be 1.
    return_description: The number of columns present in the result of the prepared statement.
  prepared_statement_column_name:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement.
      col_idx:
        type: idx
        description: The column index.
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Returns the name of the specified column of the result of the prepared_statement.
      The returned string should be freed using `duckdb_free`.

      Returns `nullptr` if the column is out of range.
    return_description: The column name of the specified column.
  prepared_statement_column_logical_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement to fetch the column type from.
      col_idx:
        type: idx
        description: The column index.
    return_type: logical_type
    description: |
      Returns the column type of the specified column of the result of the prepared_statement.

      Returns `DUCKDB_TYPE_INVALID` if the column is out of range.
      The return type of this call should be destroyed with `duckdb_destroy_logical_type`.
    return_description: The logical type of the specified column.
  prepared_statement_column_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement to fetch the column type from.
      col_idx:
        type: idx
        description: The column index.
    return_type: type
    description: |
      Returns the column type of the specified column of the result of the prepared_statement.

      Returns `DUCKDB_TYPE_INVALID` if the column is out of range.
    return_description: The type of the specified column.
  bind_value:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
      param_idx:
        type: idx
      val:
        type: value
    return_type: state
    description: |
      Binds a value to the prepared statement at the specified index.

      Supersedes all type-specific bind functions (e.g., `duckdb_bind_varchar`, `duckdb_bind_int64`, etc.).
  bind_parameter_index:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
      param_idx_out:
        type: idx
        indirection: 1
        kind: OUT
      name:
        type: char
        indirection: 1
        const: true
    return_type: state
    description: |
      Retrieve the index of the parameter for the prepared statement, identified by name
  bind_boolean:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
      param_idx:
        type: idx
      val:
        type: bool
    return_type: state
    description: |
      Binds a bool value to the prepared statement at the specified index.
  bind_int8:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
