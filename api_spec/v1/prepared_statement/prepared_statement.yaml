  execute_prepared:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement to execute.
      out_result:
        type: result
        indirection: 1
        kind: OUT
        description: The query result.
    return_type: state
    description: |
      Executes the prepared statement with the given bound parameters, and returns a materialized query result.

      This method can be called multiple times for each prepared statement, and the parameters can be modified
      between calls to this function.

      Note that the result must be freed with `duckdb_destroy_result`.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure.'
  extract_statements:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      connection:
        type: connection
        description: The connection object
      query:
        type: char
        indirection: 1
        const: true
        description: The SQL query to extract
      out_extracted_statements:
        type: extracted_statements
        indirection: 1
        kind: OUT
        description: The resulting extracted statements object
    return_type: idx
    description: |
      Extract all statements from a query.
      Note that after calling `duckdb_extract_statements`, the extracted statements should always be destroyed using
      `duckdb_destroy_extracted`, even if no statements were extracted.

      If the extract fails, `duckdb_extract_statements_error` can be called to obtain the reason why the extract failed.
    return_description: The number of extracted statements or 0 on failure.
  prepare_extracted_statement:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      connection:
        type: connection
        description: The connection object
      extracted_statements:
        type: extracted_statements
        description: The extracted statements object
      index:
        type: idx
        description: The index of the extracted statement to prepare
      out_prepared_statement:
        type: prepared_statement
        indirection: 1
        kind: OUT
        description: The resulting prepared statement object
    return_type: state
    description: |
      Prepare an extracted statement.
      Note that after calling `duckdb_prepare_extracted_statement`, the prepared statement should always be destroyed using
      `duckdb_destroy_prepare`, even if the prepare fails.

      If the prepare fails, `duckdb_prepare_error` can be called to obtain the reason why the prepare failed.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure.'
  extract_statements_error:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      extracted_statements:
        type: extracted_statements
        description: The extracted statements to fetch the error from.
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Returns the error message contained within the extracted statements.
      The result of this function must not be freed. It will be cleaned up when `duckdb_destroy_extracted` is called.
    return_description: The error of the extracted statements.
  destroy_extracted:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    role: destructor
    belongs_to: extracted_statements
    parameters:
      extracted_statements:
        type: extracted_statements
        indirection: 1
        description: The extracted statements to destroy.
    return_type: opaque
    description: |
      De-allocates all memory allocated for the extracted statements.
  execute_prepared_streaming:
    lifecycle:
      - ["deprecated", "v1.5.4", "2026-05-19"]
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement to execute.
      out_result:
        type: result
        indirection: 1
        kind: OUT
        description: The query result.
    return_type: state
    description: |
      **DEPRECATION NOTICE**: This method is scheduled for removal in a future release.

      Executes the prepared statement with the given bound parameters, and returns an optionally-streaming query result.
      To determine if the resulting query was in fact streamed, use `duckdb_result_is_streaming`

      This method can be called multiple times for each prepared statement, and the parameters can be modified
      between calls to this function.

      Note that the result must be freed with `duckdb_destroy_result`.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure.'
  pending_prepared_streaming:
    lifecycle:
      - ["deprecated", "v1.5.4", "2026-05-19"]
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      prepared_statement:
        type: prepared_statement
        description: The prepared statement to execute.
      out_result:
        type: pending_result
        indirection: 1
        kind: OUT
        description: The pending query result.
    return_type: state
    description: |
      **DEPRECATION NOTICE**: This method is scheduled for removal in a future release.

      Executes the prepared statement with the given bound parameters, and returns a pending result.
      This pending result will create a streaming duckdb_result when executed.
      The pending result represents an intermediate structure for a query that is not yet fully executed.

      Note that after calling `duckdb_pending_prepared_streaming`, the pending result should always be destroyed using
      `duckdb_destroy_pending`, even if this function returns DuckDBError.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure.'
