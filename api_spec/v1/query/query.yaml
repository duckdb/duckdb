module: query
functions:
  query:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      connection:
        type: connection
        description: The connection to perform the query in.
      query:
        type: char
        indirection: 1
        const: true
        description: The SQL query to run.
      out_result:
        type: result
        indirection: 1
        kind: OUT
        description: The query result.
    return_type: state
    description: |
      Executes a SQL query within a connection and stores the full (materialized) result in the out_result pointer.
      If the query fails to execute, DuckDBError is returned and the error message can be retrieved by calling
      `duckdb_result_error`.

      Note that after running `duckdb_query`, `duckdb_destroy_result` must be called on the result object even if the
      query fails, otherwise the error stored within the result will not be freed correctly.
    return_description: '`DuckDBSuccess` on success or `DuckDBError` on failure.'
  destroy_result:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result to destroy.
    return_type: opaque
    description: |
      Closes the result and de-allocates all memory allocated for that result.
  column_name:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result object to fetch the column name from.
      col:
        type: idx
        description: The column index.
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Returns the column name of the specified column. The result should not need to be freed; the column names will
      automatically be destroyed when the result is destroyed.

      Returns `NULL` if the column is out of range.
    return_description: The column name of the specified column.
  column_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result object to fetch the column type from.
      col:
        type: idx
        description: The column index.
    return_type: type
    description: |
      Returns the column type of the specified column.

      Returns `DUCKDB_TYPE_INVALID` if the column is out of range.
    return_description: The column type of the specified column.
  result_statement_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        description: The result object to fetch the statement type from.
    return_type: statement_type
    description: |
      Returns the statement type of the statement that was executed
    return_description: duckdb_statement_type value or DUCKDB_STATEMENT_TYPE_INVALID
  column_logical_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result object to fetch the column type from.
      col:
        type: idx
        description: The column index.
    return_type: logical_type
    description: |
      Returns the logical column type of the specified column.

      The return type of this call should be destroyed with `duckdb_destroy_logical_type`.

      Returns `NULL` if the column is out of range.
    return_description: The logical column type of the specified column.
  result_get_arrow_options:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result object to fetch arrow options from.
    return_type: arrow_options
    description: |
      Returns the arrow options associated with the given result. These options are definitions of how the arrow arrays/schema should be produced.
    return_description: The arrow options associated with the given result. This must be destroyed with `duckdb_destroy_arrow_options`.
  column_count:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result object.
    return_type: idx
    description: |
      Returns the number of columns present in a the result object.
    return_description: The number of columns present in the result object.
  rows_changed:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result object.
    return_type: idx
    description: |
      Returns the number of rows changed by the query stored in the result. This is relevant only for INSERT/UPDATE/DELETE
      queries. For other queries the rows_changed will be 0.
    return_description: The number of rows changed.
  result_error:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result object to fetch the error from.
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Returns the error message contained within the result. The error is only set if `duckdb_query` returns `DuckDBError`.

      The result of this function must not be freed. It will be cleaned up when `duckdb_destroy_result` is called.
    return_description: The error of the result.
  result_error_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result object to fetch the error from.
    return_type: error_type
    description: |
      Returns the result error type contained within the result. The error is only set if `duckdb_query` returns
      `DuckDBError`.
    return_description: The error type of the result.
  result_return_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        description: The result object
    return_type: result_type
    description: |
      Returns the return_type of the given result, or DUCKDB_RETURN_TYPE_INVALID on error
    return_description: The return_type
  fetch_chunk:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        description: The result object to fetch the data chunk from.
    return_type: data_chunk
    description: |
      Fetches a data chunk from a duckdb_result. This function should be called repeatedly until the result is exhausted.

      The result must be destroyed with `duckdb_destroy_data_chunk`.

      It is not known beforehand how many chunks will be returned by this result.
    return_description: The resulting data chunk. Returns `NULL` if the result has an error.
  create_error_data:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    role: constructor
    belongs_to: error_data
    parameters:
      type:
        type: error_type
        description: The error type.
      message:
        type: char
        indirection: 1
        const: true
        description: The error message.
    return_type: error_data
    description: |
      Creates duckdb_error_data.
      Must be destroyed with `duckdb_destroy_error_data`.
    return_description: The error data.
  destroy_error_data:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    role: destructor
    belongs_to: error_data
    parameters:
      error_data:
        type: error_data
        indirection: 1
        description: The error data to destroy.
    return_type: opaque
    description: |
      Destroys the error data and deallocates its memory.
  error_data_error_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      error_data:
        type: error_data
        description: The error data.
    return_type: error_type
    description: |
      Returns the duckdb_error_type of the error data.
    return_description: The error type.
  error_data_message:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      error_data:
        type: error_data
        description: The error data.
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Returns the error message of the error data. Must not be freed.
    return_description: The error message.
  error_data_has_error:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      error_data:
        type: error_data
        description: The error data.
    return_type: bool
    description: |
      Returns whether the error data contains an error or not.
    return_description: True, if the error data contains an exception, else false.
  malloc:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      size:
        type: size
        description: The number of bytes to allocate.
    return_type: opaque
    return_pointer: 1
    description: |
      Allocate `size` bytes of memory using the duckdb internal malloc function. Any memory allocated in this manner
      should be freed using `duckdb_free`.
    return_description: A pointer to the allocated memory region.
  free:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      ptr:
        type: opaque
        indirection: 1
        description: The memory region to de-allocate.
    return_type: opaque
    description: |
      Free a value returned from `duckdb_malloc`, `duckdb_value_varchar`, `duckdb_value_blob`, or
      `duckdb_value_string`.
  vector_size:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters: {}
    return_type: idx
    description: |
      The internal vector size used by DuckDB.
      This is the amount of tuples that will fit into a data chunk created by `duckdb_create_data_chunk`.
    return_description: The vector size.
  string_is_inlined:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      string:
        type: duckdb_string_t
    return_type: bool
    description: |
      Whether or not the duckdb_string_t value is inlined.
      This means that the data of the string does not have a separate allocation.
  string_t_length:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      string:
        type: duckdb_string_t
        description: The string to get the length of.
    return_type: u32
    description: |
      Get the length of a string
    return_description: The length.
  string_t_data:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      string:
        type: duckdb_string_t
        indirection: 1
        description: The string to get the pointer to.
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Get a pointer to the string data of a string
    return_description: The pointer.
  valid_utf8_check:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      str:
        type: char
        indirection: 1
        const: true
        description: The string to check
      len:
        type: idx
        description: The length of the string (in bytes)
    return_type: error_data
    description: |
      Checks if a string is valid UTF-8.
    return_description: nullptr if the string is valid UTF-8. Otherwise, a duckdb_error_data containing error information. Must be destroyed with `duckdb_destroy_error_data`.
  row_count:
    lifecycle:
      - ["deprecated", "v1.5.4", "2026-05-19"]
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result object.
    return_type: idx
    description: |
      **DEPRECATION NOTICE**: This method is scheduled for removal in a future release.

      Returns the number of rows present in the result object.
    return_description: The number of rows present in the result object.
  column_data:
    lifecycle:
      - ["deprecated", "v1.5.4", "2026-05-19"]
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result object to fetch the column data from.
      col:
        type: idx
        description: The column index.
    return_type: opaque
    return_pointer: 1
    description: |
      **DEPRECATED**: Prefer using `duckdb_result_get_chunk` instead.

      Returns the data of a specific column of a result in columnar format.

      The function returns a dense array which contains the result data. The exact type stored in the array depends on the
      corresponding duckdb_type (as provided by `duckdb_column_type`). For the exact type by which the data should be
      accessed, see the comments in [the types section](types) or the `DUCKDB_TYPE` enum.

      For example, for a column of type `DUCKDB_TYPE_INTEGER`, rows can be accessed in the following manner:
      ```c
      int32_t *data = (int32_t *) duckdb_column_data(&result, 0);
      printf("Data for row %d: %d\n", row, data[row]);
      ```
    return_description: The column data of the specified column.
  nullmask_data:
    lifecycle:
      - ["deprecated", "v1.5.4", "2026-05-19"]
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        indirection: 1
        description: The result object to fetch the nullmask from.
      col:
        type: idx
        description: The column index.
    return_type: bool
    return_pointer: 1
    description: |
      **DEPRECATED**: Prefer using `duckdb_result_get_chunk` instead.

      Returns the nullmask of a specific column of a result in columnar format. The nullmask indicates for every row
      whether or not the corresponding row is `NULL`. If a row is `NULL`, the values present in the array provided
      by `duckdb_column_data` are undefined.

      ```c
      int32_t *data = (int32_t *) duckdb_column_data(&result, 0);
      bool *nullmask = duckdb_nullmask_data(&result, 0);
      if (nullmask[row]) {
          printf("Data for row %d: NULL\n", row);
      } else {
          printf("Data for row %d: %d\n", row, data[row]);
      }
      ```
    return_description: The nullmask of the specified column.
  result_get_chunk:
    lifecycle:
      - ["deprecated", "v1.5.4", "2026-05-19"]
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        description: The result object to fetch the data chunk from.
      chunk_index:
        type: idx
        description: The chunk index to fetch from.
    return_type: data_chunk
    description: |
      **DEPRECATION NOTICE**: This method is scheduled for removal in a future release.

      Fetches a data chunk from the duckdb_result. This function should be called repeatedly until the result is exhausted.

      The result must be destroyed with `duckdb_destroy_data_chunk`.

      This function supersedes all `duckdb_value` functions, as well as the `duckdb_column_data` and `duckdb_nullmask_data`
      functions. It results in significantly better performance, and should be preferred in newer code-bases.

      If this function is used, none of the other result functions can be used and vice versa (i.e. this function cannot be
      mixed with the legacy result functions).

      Use `duckdb_result_chunk_count` to figure out how many chunks there are in the result.
    return_description: The resulting data chunk. Returns `NULL` if the chunk index is out of bounds.
  result_is_streaming:
    lifecycle:
      - ["deprecated", "v1.5.4", "2026-05-19"]
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        description: The result object to check.
    return_type: bool
    description: |
      **DEPRECATION NOTICE**: This method is scheduled for removal in a future release.

      Checks if the type of the internal result is StreamQueryResult.
    return_description: Whether or not the result object is of the type StreamQueryResult
  result_chunk_count:
    lifecycle:
      - ["deprecated", "v1.5.4", "2026-05-19"]
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        description: The result object
    return_type: idx
    description: |
      **DEPRECATION NOTICE**: This method is scheduled for removal in a future release.

      Returns the number of data chunks present in the result.
    return_description: Number of data chunks present in the result.
  stream_fetch_chunk:
    lifecycle:
      - ["deprecated", "v1.5.4", "2026-05-19"]
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      result:
        type: result
        description: The result object to fetch the data chunk from.
    return_type: data_chunk
    description: |
      **DEPRECATION NOTICE**: This method is scheduled for removal in a future release.

      Fetches a data chunk from the (streaming) duckdb_result. This function should be called repeatedly until the result is
      exhausted.

      The result must be destroyed with `duckdb_destroy_data_chunk`.

      This function can only be used on duckdb_results created with 'duckdb_pending_prepared_streaming'

      If this function is used, none of the other result functions can be used and vice versa (i.e. this function cannot be
      mixed with the legacy result functions or the materialized result functions).

      It is not known beforehand how many chunks will be returned by this result.
    return_description: The resulting data chunk. Returns `NULL` if the result has an error.
