module: copy_function
functions:
  create_copy_function:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    role: constructor
    belongs_to: copy_function
    parameters: {}
    return_type: copy_function
    description: |
      Creates a new empty copy function.

      The return value must be destroyed with `duckdb_destroy_copy_function`.
    return_description: The copy function object.
  copy_function_set_name:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      copy_function:
        type: copy_function
        description: The copy function
      name:
        type: char
        indirection: 1
        const: true
        description: The name to set
    return_type: opaque
    description: |
      Sets the name of the copy function.
  copy_function_set_extra_info:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      copy_function:
        type: copy_function
        description: The copy function
      extra_info:
        type: opaque
        indirection: 1
        description: The extra info pointer
      destructor:
        type: delete_callback_t
        description: A destructor function to call to destroy the extra info
    return_type: opaque
    description: |
      Sets the extra info pointer of the copy function, which can be used to store arbitrary data.
  register_copy_function:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      connection:
        type: connection
        description: The database connection
      copy_function:
        type: copy_function
        description: The copy function to register
    return_type: state
    description: |
      Registers the given copy function on the database connection under the specified name.
  destroy_copy_function:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    role: destructor
    belongs_to: copy_function
    parameters:
      copy_function:
        type: copy_function
        indirection: 1
        description: The copy function to destroy.
    return_type: opaque
    description: |
      Destroys the given copy function object.
  copy_function_set_bind:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      copy_function:
        type: copy_function
      bind:
        type: copy_function_bind_t
        description: The bind function
    return_type: opaque
    description: |
      Sets the bind function of the copy function, to use when binding `COPY ... TO`.
  copy_function_bind_set_error:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_bind_info
        description: The bind info provided to the bind function
      error:
        type: char
        indirection: 1
        const: true
        description: The error message
    return_type: opaque
    description: |
      Report that an error occurred during the binding-phase of a `COPY ... TO` function.
  copy_function_bind_get_extra_info:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_bind_info
        description: The bind info provided to the bind function
    return_type: opaque
    return_pointer: 1
    description: |
      Retrieves the extra info pointer of the copy function.
    return_description: The extra info pointer.
  copy_function_bind_get_client_context:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_bind_info
        description: The bind info provided to the bind function
    return_type: client_context
    description: |
      Retrieves the client context of the current connection binding the `COPY ... TO` function.

      Must be destroyed with `duckdb_destroy_client_context`
    return_description: The client context.
  copy_function_bind_get_column_count:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_bind_info
        description: The bind info provided to the bind function
    return_type: idx
    description: |
      Retrieves the number of columns that will be provided to the `COPY ... TO` function.
    return_description: The number of columns.
  copy_function_bind_get_column_type:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_bind_info
        description: The bind info provided to the bind function
      col_idx:
        type: idx
        description: The index of the column to retrieve the type for
    return_type: logical_type
    description: |
      Retrieves the type of a column that will be provided to the `COPY ... TO` function.
    return_description: The type of the column. Must be destroyed with `duckdb_destroy_logical_type`.
  copy_function_bind_get_options:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_bind_info
        description: The bind info provided to the bind function
    return_type: value
    description: |
      Retrieves all values for the given options provided to the `COPY ... TO` function.
    return_description: A STRUCT value containing all options as fields. Must be destroyed with `duckdb_destroy_value`.
  copy_function_bind_set_bind_data:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_bind_info
        description: The bind info provided to the bind function
      bind_data:
        type: opaque
        indirection: 1
        description: The bind data pointer
      destructor:
        type: delete_callback_t
        description: A destructor function to call to destroy the bind data
    return_type: opaque
    description: |
      Sets the bind data of the copy function, to be provided to the init, sink and finalize functions.
  copy_function_set_global_init:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      copy_function:
        type: copy_function
      init:
        type: copy_function_global_init_t
        description: The init function
    return_type: opaque
    description: |
      Sets the initialization function of the copy function, called right before executing `COPY ... TO`.
  copy_function_global_init_set_error:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_global_init_info
        description: The init info provided to the init function
      error:
        type: char
        indirection: 1
        const: true
        description: The error message
    return_type: opaque
    description: |
      Report that an error occurred during the initialization-phase of a `COPY ... TO` function.
  copy_function_global_init_get_extra_info:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_global_init_info
        description: The init info provided to the init function
    return_type: opaque
    return_pointer: 1
    description: |
      Retrieves the extra info pointer of the copy function.
    return_description: The extra info pointer.
  copy_function_global_init_get_client_context:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_global_init_info
        description: The init info provided to the init function
    return_type: client_context
    description: |
      Retrieves the client context of the current connection initializing the `COPY ... TO` function.

      Must be destroyed with `duckdb_destroy_client_context`
    return_description: The client context.
  copy_function_global_init_get_bind_data:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_global_init_info
        description: The init info provided to the init function
    return_type: opaque
    return_pointer: 1
    description: |
      Retrieves the bind data provided during the binding-phase of a `COPY ... TO` function.
    return_description: The bind data pointer.
  copy_function_global_init_get_file_path:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_global_init_info
        description: The init info provided to the init function
    return_type: char
    return_pointer: 1
    return_const: true
    description: |
      Retrieves the file path provided to the `COPY ... TO` function.

      Lives for the duration of the initialization callback, must not be destroyed.
    return_description: The file path.
  copy_function_global_init_set_global_state:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_global_init_info
        description: The init info provided to the init function
      global_state:
        type: opaque
        indirection: 1
        description: The global state pointer
      destructor:
        type: delete_callback_t
        description: A destructor function to call to destroy the global state
    return_type: opaque
    description: |
      Sets the global state of the copy function, to be provided to all subsequent local init, sink and finalize functions.
  copy_function_set_sink:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      copy_function:
        type: copy_function
      function:
        type: copy_function_sink_t
        description: The sink function
    return_type: opaque
    description: |
      Sets the sink function of the copy function, called during `COPY ... TO`.
  copy_function_sink_set_error:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_sink_info
        description: The sink info provided to the sink function
      error:
        type: char
        indirection: 1
        const: true
        description: The error message
    return_type: opaque
    description: |
      Report that an error occurred during the sink-phase of a `COPY ... TO` function.
  copy_function_sink_get_extra_info:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_sink_info
        description: The sink info provided to the sink function
    return_type: opaque
    return_pointer: 1
    description: |
      Retrieves the extra info pointer of the copy function.
    return_description: The extra info pointer.
  copy_function_sink_get_client_context:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_sink_info
        description: The sink info provided to the sink function
    return_type: client_context
    description: |
      Retrieves the client context of the current connection during the sink-phase of the `COPY ... TO` function.

      Must be destroyed with `duckdb_destroy_client_context`
    return_description: The client context.
  copy_function_sink_get_bind_data:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_sink_info
        description: The sink info provided to the sink function
    return_type: opaque
    return_pointer: 1
    description: |
      Retrieves the bind data provided during the binding-phase of a `COPY ... TO` function.
    return_description: The bind data pointer.
  copy_function_sink_get_global_state:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_sink_info
        description: The sink info provided to the sink function
    return_type: opaque
    return_pointer: 1
    description: |
      Retrieves the global state provided during the init-phase of a `COPY ... TO` function.
    return_description: The global state pointer.
  copy_function_set_finalize:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      copy_function:
        type: copy_function
      finalize:
        type: copy_function_finalize_t
        description: The finalize function
    return_type: opaque
    description: |
      Sets the finalize function of the copy function, called at the end of `COPY ... TO`.
  copy_function_finalize_set_error:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_finalize_info
        description: The finalize info provided to the finalize function
      error:
        type: char
        indirection: 1
        const: true
        description: The error message
    return_type: opaque
    description: |
      Report that an error occurred during the finalize-phase of a `COPY ... TO` function
  copy_function_finalize_get_extra_info:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_finalize_info
        description: The finalize info provided to the finalize function
    return_type: opaque
    return_pointer: 1
    description: |
      Retrieves the extra info pointer of the copy function.
    return_description: The extra info pointer.
  copy_function_finalize_get_client_context:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_finalize_info
        description: The finalize info provided to the finalize function
    return_type: client_context
    description: |
      Retrieves the client context of the current connection during the finalize-phase of the `COPY ... TO` function.

      Must be destroyed with `duckdb_destroy_client_context`
    return_description: The client context.
  copy_function_finalize_get_bind_data:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_finalize_info
        description: The finalize info provided to the finalize function
    return_type: opaque
    return_pointer: 1
    description: |
      Retrieves the bind data provided during the binding-phase of a `COPY ... TO` function.
    return_description: The bind data pointer.
  copy_function_finalize_get_global_state:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      info:
        type: copy_function_finalize_info
        description: The finalize info provided to the finalize function
    return_type: opaque
    return_pointer: 1
    description: |
      Retrieves the global state provided during the init-phase of a `COPY ... TO` function.
    return_description: The global state pointer.
  copy_function_set_copy_from_function:
    lifecycle:
      - ["frozen", "v1.5.4", "2026-05-18"]
    parameters:
      copy_function:
        type: copy_function
        description: The copy function
      table_function:
        type: table_function
        description: The table function to use for `COPY ... FROM`
    return_type: opaque
    description: |
      Sets the table function to use when executing a `COPY ... FROM (...)` statement with this copy function.

      The table function must have a `duckdb_table_function_bind_t`, `duckdb_table_function_init_t` and `duckdb_table_function_t` set.

      The table function must take a single VARCHAR parameter (the file path).

      Options passed to the `COPY ... FROM (...)` statement are forwarded as named parameters to the table function.

      Since `COPY ... FROM` copies into an already existing table, the table function should not define its own result columns using `duckdb_bind_add_result_column` when binding
      . Instead use `duckdb_table_function_bind_get_result_column_count` and related functions in the bind callback of the table function to retrieve the schema of the target table of the `COPY ... FROM` statement.
