# Hardened Codecov Configuration for Nu64 & Bengal Database
comment: true
coverage:
  precision: 2
  round: down
  range: "70...100" # Focus on the high-security range
  status:
    project:
      default:
        target: auto
        threshold: 1% # Fail if coverage drops by more than 1%
        if_not_found: error # STRICT: Do not pass if data is missing
        if_ci_failed: error
        informational: false # STRICT: This will now BLOCK insecure PRs
    patch:
      default:
        target: 100% # Every new line of code MUST be tested
        if_not_found: error
        informational: false
